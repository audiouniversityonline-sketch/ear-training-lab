    /* ---------- EQ-curve visualization ----------
       Pure RBJ peaking-filter magnitude, computed analytically so the curve
       matches the answer/learn data — not the live, time-multiplexed nodes. */
    function peakingMagnitudeDb(f, f0, gainDb, Q, fs) {
      if (!gainDb) return 0;
      const A = Math.pow(10, gainDb / 40);
      const w0 = 2 * Math.PI * f0 / fs;
      const cw0 = Math.cos(w0);
      const alpha = Math.sin(w0) / (2 * Q);
      const b0 = 1 + alpha * A, b1 = -2 * cw0, b2 = 1 - alpha * A;
      const a0 = 1 + alpha / A, a1 = -2 * cw0, a2 = 1 - alpha / A;
      const w = 2 * Math.PI * f / fs;
      const cw = Math.cos(w), c2w = Math.cos(2 * w);
      const num = b0*b0 + b1*b1 + b2*b2 + 2*(b0*b1 + b1*b2)*cw + 2*b0*b2*c2w;
      const den = a0*a0 + a1*a1 + a2*a2 + 2*(a0*a1 + a1*a2)*cw + 2*a0*a2*c2w;
      return 10 * Math.log10(num / den);
    }

    function EqCurve({ filters = [], guess = null, fs = 48000 }) {
      const W = 900, H = 190;
      const padL = 14, padR = 14, padT = 14, padB = 22;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const fMin = 20, fMax = 20000, dbMax = 15;
      const lgMin = Math.log10(fMin), lgSpan = Math.log10(fMax) - lgMin;
      const lx = (f) => padL + (Math.log10(f) - lgMin) / lgSpan * plotW;
      const ly = (db) => padT + plotH / 2 - (Math.max(-dbMax, Math.min(dbMax, db)) / dbMax) * (plotH / 2);
      const sumDb = (set, f) => (set || []).reduce((s, flt) =>
        s + peakingMagnitudeDb(f, flt.freq, (flt.direction === 'cut' ? -1 : 1) * (flt.gainDb || 0), DEFAULT_Q, fs), 0);
      const N = 160;
      const buildPath = (set) => {
        let d = '';
        for (let i = 0; i <= N; i++) {
          const f = fMin * Math.pow(fMax / fMin, i / N);
          d += (i ? 'L' : 'M') + lx(f).toFixed(1) + ' ' + ly(sumDb(set, f)).toFixed(1) + ' ';
        }
        return d.trim();
      };
      const gridFreqs = [63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
      return (
        <svg className="eq-curve" viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }} role="img" aria-label="EQ frequency response">
          {gridFreqs.map(f => <line key={'g' + f} className="eq-grid-line" x1={lx(f)} y1={padT} x2={lx(f)} y2={padT + plotH} />)}
          {[-12, -6, 6, 12].map(db => <line key={'h' + db} className="eq-grid-line" x1={padL} y1={ly(db)} x2={padL + plotW} y2={ly(db)} opacity="0.45" />)}
          <line className="eq-zero-line" x1={padL} y1={ly(0)} x2={padL + plotW} y2={ly(0)} />
          {guess && guess.length > 0 && (
            <path d={buildPath(guess)} fill="none" stroke="var(--ink-3)" strokeWidth="2" strokeDasharray="5 4" vectorEffect="non-scaling-stroke" />
          )}
          <path d={buildPath(filters)} fill="none" stroke="var(--accent)" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
          {gridFreqs.map(f => <text key={'t' + f} className="eq-axis-label" x={lx(f)} y={H - 7} textAnchor="middle">{bandLabel(f)}</text>)}
        </svg>
      );
    }

    /* Horizontal LED accuracy meter — colour shifts green/amber/red by performance. */
    function AccuracyMeter({ value = 0, segments = 16 }) {
      const v = Math.max(0, Math.min(1, value));
      const lit = Math.round(v * segments);
      const color = v >= 0.8 ? 'var(--green)' : v >= 0.5 ? 'var(--amber)' : 'var(--hot)';
      return (
        <div style={{ display: 'flex', gap: 2, alignItems: 'stretch', height: 10 }}>
          {Array.from({ length: segments }).map((_, i) => {
            const on = i < lit;
            return <div key={i} style={{
              flex: 1, borderRadius: 1,
              background: on ? color : 'var(--panel-3)',
              boxShadow: on ? `0 0 4px ${color}` : 'inset 0 0 2px #000',
              opacity: on ? 1 : 0.5,
            }} />;
          })}
        </div>
      );
    }

    function App() {
      /* ---------- Audio state ---------- */
      const [audioReady, setAudioReady] = useState(false);
      const [showUnlock, setShowUnlock] = useState(true);
      const [audioLoading, setAudioLoading] = useState(false);
      const [audioError, setAudioError] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [listenCh, setListenCh] = useState("A");
      const [audioSource, setAudioSource] = useState('noise');
      const [customAudioBuffer, setCustomAudioBuffer] = useState(null);
      const [customFileName, setCustomFileName] = useState('');
      const [customAudioInfo, setCustomAudioInfo] = useState(null);
      const [isLoadingFile, setIsLoadingFile] = useState(false);
      const [hasLeftChannelA, setHasLeftChannelA] = useState(false);

      /* ---------- Game state ---------- */
      const [mode, setMode] = useState("Matching");
      const [round, setRound] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [showTaskComplete, setShowTaskComplete] = useState(false);
      const [taskCompleteData, setTaskCompleteData] = useState(null);
      const [showCurriculum, setShowCurriculum] = useState(false);
      // Mistake review (Phase 3a): A/B between actual and guess after a wrong Identify/Matching round.
      const [reviewState, setReviewState] = useState({
        active: false,
        listening: 'actual',
        guessFreq: null,
        guessDir: null
      });
      // Learn mode (Phase 3b): labeled exposure — pick a freq, hear it, train your ear.
      const [isLearnMode, setIsLearnMode] = useState(false);

      const [curriculumWeek, setCurriculumWeek] = useState(() => {
        // Free version uses its own localStorage namespace so it doesn't collide with
        // the member app on the same domain. If a URL parameter specifies a week,
        // that wins. Otherwise we read from storage — but we validate the stored
        // value against what's actually in the free curriculum, falling back if the
        // week doesn't exist (e.g. member app data bleeding over, or old free data
        // from a previous version).
        const url = new URL(window.location.href);
        const wk = url.searchParams.get("week");
        const requested = wk ? parseInt(wk, 10) : STORAGE.get("freeSampleWeek", 1);
        const weekExists = CURRICULUM.weeks.some(w => w.week === requested);
        return weekExists ? requested : 1;
      });
      const [curriculumTaskIndex, setCurriculumTaskIndex] = useState(() => {
        const storedWeek = STORAGE.get("freeSampleWeek", 1);
        const storedIdx = STORAGE.get("freeSampleTaskIndex", 0);
        const weekPlan = CURRICULUM.weeks.find(w => w.week === storedWeek);
        if (!weekPlan) return 0;
        return storedIdx >= 0 && storedIdx < weekPlan.tasks.length ? storedIdx : 0;
      });

      const [questionsPerRound, setQuestionsPerRound] = useState(10);
      const [q, setQ] = useState(DEFAULT_Q);
      const [gainDb, setGainDb] = useState(DEFAULT_GAIN_DB);
      const [eqMode, setEqMode] = useState("boost");
      const [outputTrim, setOutputTrim] = useState(-3);
      const [bandPool, setBandPool] = useState(OCTAVE_BANDS);
      const [timeLimit, setTimeLimit] = useState(0);
      const [timeRemaining, setTimeRemaining] = useState(null);

      const [guessFreq, setGuessFreq] = useState(null);
      const [guessDir, setGuessDir] = useState(null);
      const [answerFreq, setAnswerFreq] = useState(null);
      const [answerDir, setAnswerDir] = useState(null);
      const [answerTouched, setAnswerTouched] = useState(false);

      const [roundNum, setRoundNum] = useState(1);
      const [qInRound, setQInRound] = useState(0);
      const [roundCorrect, setRoundCorrect] = useState(0);
      const [sessionCorrect, setSessionCorrect] = useState(0);
      const [sessionTotal, setSessionTotal] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);

      /* Per-week progress persisted to localStorage: { [weekNum]: { [taskIdx]: accuracy } } */
      const [progress, setProgress] = useState(() => migrateProgress(STORAGE.get("freeSampleProgress", {})));
      const [currentLevelId, setCurrentLevelId] = useState(() => CURRICULUM.levels?.[0]?.id ?? 1);

      /* Mobile settings drawer */
      const [showDrawer, setShowDrawer] = useState(false);

      /* ---------- Audio refs ---------- */
      const audioContextRef = useRef(null);
      const sourceRef = useRef(null);
      const masterGainRef = useRef(null);
      const channelGainsRef = useRef({});
      const filtersRef = useRef({});
      const noiseBufferRef = useRef(null);
      const revealSwapTimeoutRef = useRef(null);
      const fileInputRef = useRef(null);

      /* ---------- Derived ---------- */
      const clearRevealSwap = () => {
        if (revealSwapTimeoutRef.current) {
          clearTimeout(revealSwapTimeoutRef.current);
          revealSwapTimeoutRef.current = null;
        }
      };

      const isChannelDisabled = (channel) =>
        mode === "Return to Flat (Memory)" && channel === "A" && hasLeftChannelA;

      const switchToChannel = (channel) => {
        if (mode === "Return to Flat (Memory)" && listenCh === "A" && channel !== "A") {
          setHasLeftChannelA(true);
        }
        setListenCh(channel);
      };

      const getWeekPlan = (n) => CURRICULUM.weeks.find(w => w.week === n);
      const getCurrentTask = () => {
        const wp = getWeekPlan(curriculumWeek);
        return wp ? wp.tasks[curriculumTaskIndex] : null;
      };
      const getNextTask = () => {
        const wp = getWeekPlan(curriculumWeek);
        if (!wp) return null;
        if (curriculumTaskIndex + 1 < wp.tasks.length) {
          return { week: curriculumWeek, taskIndex: curriculumTaskIndex + 1, task: wp.tasks[curriculumTaskIndex + 1] };
        }
        const nextWeekPlan = getWeekPlan(curriculumWeek + 1);
        if (nextWeekPlan && nextWeekPlan.tasks.length > 0) {
          return { week: curriculumWeek + 1, taskIndex: 0, task: nextWeekPlan.tasks[0] };
        }
        return null;
      };

      /*
       * Progress shape: { [weekNum]: { [taskIdx]: { completed: true, score?: number } } }
       * Legacy shape (numbers) is auto-migrated on read. Score is present only when the member
       * actually ran the task.
       */
      const saveProgress = (week, taskIdx, accuracy) => {
        setProgress(prev => {
          const levelData = prev.levels?.[currentLevelId] || {};
          const existing = levelData[week]?.[taskIdx];
          const existingObj = typeof existing === 'number' ? { completed: true, score: existing } : (existing || {});
          const next = {
            schemaVersion: 2,
            levels: {
              ...(prev.levels || {}),
              [currentLevelId]: {
                ...levelData,
                [week]: {
                  ...(levelData[week] || {}),
                  [taskIdx]: { ...existingObj, completed: true, score: accuracy }
                }
              }
            }
          };
          STORAGE.set("freeSampleProgress", next);
          return next;
        });
      };

      /* ---------- File upload ---------- */
      const handleFileUpload = async (file) => {
        setIsLoadingFile(true);
        try {
          const arrayBuffer = await file.arrayBuffer();
          const ctx = audioContextRef.current;
          if (!ctx) throw new Error('Audio context not initialized');
          const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
          setCustomAudioBuffer(audioBuffer);
          setCustomFileName(file.name);
          setCustomAudioInfo({
            channels: audioBuffer.numberOfChannels,
            sampleRate: audioBuffer.sampleRate,
            duration: audioBuffer.duration
          });
          setAudioSource('custom');
          if (isPlaying) {
            stopAudio();
            setTimeout(() => startAudio(), 100);
          }
        } catch (error) {
          alert("Couldn't load that file. Please use an uncompressed WAV.");
        } finally {
          setIsLoadingFile(false);
        }
      };

      /* ---------- Audio engine: initialize ---------- */
      const initializeAudio = async () => {
        setAudioLoading(true);
        setAudioError(null);
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) {
            throw new Error('Web Audio API not supported. Please try Chrome, Firefox, or Safari.');
          }
          const ctx = new AudioContext({
            latencyHint: 'playback',
            // 44.1 kHz on all platforms. The ear training curriculum uses bands up
            // to 16 kHz, which requires a sample rate of at least 32 kHz (Nyquist).
            // Earlier versions downsampled to 22.05 kHz on mobile for CPU reasons,
            // but that cut the top octave and compromised the training accuracy.
            sampleRate: 44100
          });
          audioContextRef.current = ctx;

          // iOS unlock: silent buffer must play during user gesture
          try {
            const silent = ctx.createBuffer(1, 1, ctx.sampleRate);
            const s = ctx.createBufferSource();
            s.buffer = silent;
            s.connect(ctx.destination);
            s.start(0);
          } catch {}

          if (ctx.state === 'suspended') {
            try { await ctx.resume(); } catch {}
          }
          if (isMobile()) await new Promise(r => setTimeout(r, 100));

          await setupAudioGraph();
          await createNoiseBuffer();

          if (ctx.state === 'suspended') {
            try { await ctx.resume(); } catch {}
            if (isMobile()) await new Promise(r => setTimeout(r, 100));
          }

          if (isMobile() && ctx.state === 'suspended') {
            setAudioReady(true);
            setShowUnlock(false);
            setAudioLoading(false);
            setTimeout(() => { startAudio().catch(() => {}); }, 200);
          } else {
            setAudioReady(true);
            setShowUnlock(false);
            setAudioLoading(false);
          }
        } catch (error) {
          let msg = 'Failed to initialize audio. ';
          if (error.message && error.message.includes('not supported')) {
            msg = error.message;
          } else if (error.message) {
            msg += error.message;
          }
          if (isMobile()) {
            msg += ' On mobile, make sure your volume is up and try using headphones.';
          }
          setAudioError(msg);
          setAudioLoading(false);
          setAudioReady(false);
        }
      };

      /* ---------- Audio graph ---------- */
      const setupAudioGraph = async () => {
        const ctx = audioContextRef.current;
        if (!ctx) throw new Error('No audio context');

        masterGainRef.current = ctx.createGain();
        channelGainsRef.current = {
          A: ctx.createGain(),
          B: ctx.createGain(),
          C: ctx.createGain()
        };
        filtersRef.current = {
          question: ctx.createBiquadFilter(),
          answer: ctx.createBiquadFilter(),
          questionForC: ctx.createBiquadFilter()
        };

        Object.values(filtersRef.current).forEach(f => {
          f.type = 'peaking';
          f.frequency.setValueAtTime(1000, ctx.currentTime);
          f.Q.setValueAtTime(DEFAULT_Q, ctx.currentTime);
          f.gain.setValueAtTime(0, ctx.currentTime);
        });

        channelGainsRef.current.A.connect(masterGainRef.current);
        filtersRef.current.question.connect(channelGainsRef.current.B);
        channelGainsRef.current.B.connect(masterGainRef.current);
        filtersRef.current.questionForC.connect(filtersRef.current.answer);
        filtersRef.current.answer.connect(channelGainsRef.current.C);
        channelGainsRef.current.C.connect(masterGainRef.current);
        masterGainRef.current.connect(ctx.destination);

        channelGainsRef.current.A.gain.setValueAtTime(1, ctx.currentTime);
        channelGainsRef.current.B.gain.setValueAtTime(0, ctx.currentTime);
        channelGainsRef.current.C.gain.setValueAtTime(0, ctx.currentTime);
        masterGainRef.current.gain.setValueAtTime(dbToGain(outputTrim), ctx.currentTime);
      };

      /* ---------- Noise ---------- */
      const createNoiseBuffer = async () => {
        const ctx = audioContextRef.current;
        if (!ctx) throw new Error('No audio context');
        // 2 seconds of noise regardless of platform. Shorter buffers on mobile
        // produced an audible looping/oscillating artifact because the buffer period
        // was short enough (0.5s) for the ear to perceive the repetition.
        const bufferLength = Math.floor(ctx.sampleRate * 2);
        const buffer = ctx.createBuffer(1, bufferLength, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        // Batch size is smaller on mobile so we yield more often and don't block the UI thread.
        const batchSize = isMobile() ? 4096 : 16384;
        for (let i = 0; i < bufferLength; i += batchSize) {
          const endIndex = Math.min(i + batchSize, bufferLength);
          for (let j = i; j < endIndex; j++) {
            const white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179;
            b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522;
            b5 = -0.7616 * b5 - white * 0.0168980;
            const pink = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
            data[j] = pink * 0.11;
            b6 = white * 0.115926;
          }
          if (isMobile()) await new Promise(r => setTimeout(r, 0));
        }
        noiseBufferRef.current = buffer;
      };

      /* ---------- Start / stop audio ---------- */
      const startAudio = async () => {
        const ctx = audioContextRef.current;
        if (!ctx) return;
        const buffer = audioSource === 'custom' ? customAudioBuffer : noiseBufferRef.current;
        if (!buffer) return;

        try {
          if (sourceRef.current) {
            try { sourceRef.current.stop(); sourceRef.current.disconnect(); } catch {}
            sourceRef.current = null;
          }
          if (ctx.state === 'suspended') {
            await ctx.resume();
            if (isMobile()) await new Promise(r => setTimeout(r, 100));
          }
          if (ctx.state !== 'running') {
            throw new Error('Audio context not running. Please interact with the page and try again.');
          }

          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(channelGainsRef.current.A);
          source.connect(filtersRef.current.question);
          if (isReturnToFlatMode(mode)) {
            source.connect(filtersRef.current.questionForC);
          } else {
            source.connect(filtersRef.current.answer);
          }
          source.start(0);
          sourceRef.current = source;
          setIsPlaying(true);
        } catch (error) {
          setAudioError('Failed to start audio: ' + error.message);
          setIsPlaying(false);
        }
      };

      const stopAudio = () => {
        if (sourceRef.current) {
          try { sourceRef.current.stop(); sourceRef.current.disconnect(); } catch {}
          sourceRef.current = null;
        }
        setIsPlaying(false);
      };

      const toggleAudio = async () => {
        if (isPlaying) stopAudio();
        else await startAudio();
      };

      /* ---------- Filter updates ---------- */
      const updateFilters = () => {
        const ctx = audioContextRef.current;
        if (!ctx || !filtersRef.current.question || !filtersRef.current.answer) return;
        try {
          const now = ctx.currentTime;
          if (round && round.freq !== undefined) {
            // Review mode: when listening to "your guess," route the question filter to the
            // freq/direction the user picked instead of the actual answer.
            const useGuess = reviewState.active && reviewState.listening === 'guess'
              && reviewState.guessFreq !== null && reviewState.guessFreq !== undefined;
            const qFreq = useGuess ? reviewState.guessFreq : round.freq;
            const qDir = useGuess ? (reviewState.guessDir || round.direction) : round.direction;
            const questionGain = (qDir === "cut" ? -1 : 1) * gainDb;
            filtersRef.current.question.frequency.setValueAtTime(qFreq, now);
            filtersRef.current.question.gain.setValueAtTime(questionGain, now);
            filtersRef.current.question.Q.setValueAtTime(q, now);
            if (isReturnToFlatMode(mode)) {
              filtersRef.current.questionForC.frequency.setValueAtTime(round.freq, now);
              filtersRef.current.questionForC.gain.setValueAtTime(questionGain, now);
              filtersRef.current.questionForC.Q.setValueAtTime(q, now);
            }
          } else {
            filtersRef.current.question.gain.setValueAtTime(0, now);
            if (isReturnToFlatMode(mode)) {
              filtersRef.current.questionForC.gain.setValueAtTime(0, now);
            }
          }
          let answerGain = 0;
          const cFreq = answerFreq || 1000;
          if (round && round.freq !== undefined) {
            if (isReturnToFlatMode(mode)) {
              if (answerFreq) {
                if (eqMode === "both") {
                  if (answerDir) answerGain = (answerDir === "cut" ? -1 : 1) * gainDb;
                } else {
                  const correctiveDirection = round.direction === "boost" ? "cut" : "boost";
                  answerGain = (correctiveDirection === "cut" ? -1 : 1) * gainDb;
                }
              }
            } else if (mode === "Matching") {
              if (answerFreq) {
                const useDirection = eqMode === "both" ? answerDir : round.direction;
                if (useDirection) answerGain = (useDirection === "cut" ? -1 : 1) * gainDb;
              }
            }
          }
          filtersRef.current.answer.frequency.setValueAtTime(cFreq, now);
          filtersRef.current.answer.gain.setValueAtTime(answerGain, now);
          filtersRef.current.answer.Q.setValueAtTime(q, now);
        } catch {}
      };

      const updateChannelGains = () => {
        const ctx = audioContextRef.current;
        if (!ctx || !channelGainsRef.current.A) return;
        try {
          const now = ctx.currentTime;
          const fadeTime = 0.01;
          channelGainsRef.current.A.gain.setTargetAtTime(listenCh === "A" ? 1 : 0, now, fadeTime);
          channelGainsRef.current.B.gain.setTargetAtTime(listenCh === "B" ? 1 : 0, now, fadeTime);
          channelGainsRef.current.C.gain.setTargetAtTime(listenCh === "C" ? 1 : 0, now, fadeTime);
        } catch {}
      };

      /* ---------- Rounds ---------- */
      const newRound = (poolOverride = null) => {
        clearRevealSwap();
        setListenCh("A");
        setHasLeftChannelA(false);
        if (reviewState.active) {
          setReviewState({ active: false, listening: 'actual', guessFreq: null, guessDir: null });
        }

        let pool = poolOverride;
        if (!pool || pool.length === 0) pool = bandPool.length > 0 ? bandPool : OCTAVE_BANDS;
        if (!pool || pool.length === 0) pool = OCTAVE_BANDS;

        const freq = pool[Math.floor(Math.random() * pool.length)];
        if (freq === undefined || freq === null) return;

        const direction = eqMode === "both" ? (Math.random() > 0.5 ? "boost" : "cut") : eqMode;
        setRound({ freq, direction, gainDb });
        setShowAnswer(false);
        setTimeRemaining(timeLimit > 0 ? timeLimit : null);
        setGuessFreq(null);
        setGuessDir(eqMode === "both" ? null : eqMode);

        if (isReturnToFlatMode(mode)) {
          setAnswerFreq(null);
          setAnswerDir(null);
          setAnswerTouched(false);
        } else if (mode === "Matching") {
          setAnswerFreq(null);
          setAnswerDir(eqMode === "both" ? null : direction);
          setAnswerTouched(false);
        } else {
          setAnswerFreq(1000);
          setAnswerDir(eqMode !== "both" ? eqMode : null);
          setAnswerTouched(false);
        }
      };

      const applyTaskSpec = (task) => {
        if (!task) return;
        setMode(task.mode);
        // direction: "auto" or "mixed" → engine flips a coin per round and the user has to
        // identify both the frequency and whether it's a boost or a cut.
        setEqMode((task.direction === "mixed" || task.direction === "auto") ? "both" : task.direction);
        setGainDb(task.gainDb ?? 12);
        // Q: use task.q if specified, otherwise fall back to the bandwidth-based default.
        // Tasks in Levels 1–15 don't set task.q, so they always get the Audio University
        // standard of 2.0. Future levels can dial narrower or wider per-task as needed.
        setQ(typeof task.q === 'number' ? task.q : qForBandwidth(task.bandwidth));
        const newBandPool = resolveFreqSet(task.freqSet);
        setBandPool(newBandPool);
        setTimeLimit(task.timeLimitSec || 0);
        setQuestionsPerRound(task.rounds || 12);
        setRound(null);
        setShowAnswer(false);
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        setAnswerTouched(false);
        setHasLeftChannelA(false);
        setTimeout(() => {
          const pool = newBandPool && newBandPool.length > 0 ? newBandPool : OCTAVE_BANDS;
          newRound(pool);
        }, 50);
      };

      const evaluateCorrectness = () => {
        if (!round || !round.freq) return false;
        if (mode === "Identify") {
          const freqCorrect = guessFreq === round.freq;
          const dirCorrect = eqMode === "both" ? guessDir === round.direction : true;
          return freqCorrect && dirCorrect;
        }
        if (mode === "Matching") {
          const freqCorrect = answerFreq === round.freq;
          const dirCorrect = eqMode === "both" ? answerDir === round.direction : true;
          return freqCorrect && dirCorrect;
        }
        if (isReturnToFlatMode(mode)) {
          const expectedDir = round.direction === "boost" ? "cut" : "boost";
          const freqCorrect = answerFreq === round.freq;
          const dirCorrect = eqMode === "both" ? answerDir === expectedDir : true;
          return freqCorrect && dirCorrect;
        }
        return false;
      };

      const submitAnswer = (isTimeout = false) => {
        if (!round || !round.freq) return;
        const correct = isTimeout ? false : evaluateCorrectness();
        const nextQ = qInRound + 1;
        setQInRound(nextQ);
        setSessionTotal(t => t + 1);
        if (correct) {
          setRoundCorrect(rc => rc + 1);
          setSessionCorrect(sc => sc + 1);
          setStreak(s => { const n = s + 1; setBestStreak(b => Math.max(b, n)); return n; });
        } else {
          setStreak(0);
        }

        // Mistake review on wrong answer (Identify/Matching only).
        if (!correct && (mode === "Identify" || mode === "Matching")) {
          const userFreq = mode === "Identify" ? guessFreq : answerFreq;
          const userDir = eqMode === "both"
            ? (mode === "Identify" ? guessDir : answerDir)
            : round.direction;
          if (userFreq) {
            setReviewState({
              active: true,
              listening: 'actual',
              guessFreq: userFreq,
              guessDir: userDir
            });
          }
        }

        if (nextQ >= questionsPerRound) {
          setRoundNum(r => r + 1);
          setQInRound(0);
          const task = getCurrentTask();
          if (task) {
            const taskCorrect = roundCorrect + (correct ? 1 : 0);
            const taskAccuracy = Math.round((taskCorrect / questionsPerRound) * 100);
            saveProgress(curriculumWeek, curriculumTaskIndex, taskAccuracy);
            setTaskCompleteData({
              taskName: task.name,
              correct: taskCorrect,
              total: questionsPerRound,
              accuracy: taskAccuracy,
              week: curriculumWeek,
              taskIndex: curriculumTaskIndex
            });
            setShowTaskComplete(true);
          }
          setRoundCorrect(0);
        }

        setShowAnswer(true);
        clearRevealSwap();
        if (mode === "Identify") {
          setListenCh("B");
        } else if (mode === "Matching") {
          setListenCh("B");
          revealSwapTimeoutRef.current = setTimeout(() => setListenCh("C"), 1000);
        } else if (isReturnToFlatMode(mode)) {
          setListenCh("A");
          revealSwapTimeoutRef.current = setTimeout(() => setListenCh("C"), 1000);
        }
      };

      const resetStats = () => {
        setRoundNum(1);
        setQInRound(0);
        setRoundCorrect(0);
        setSessionCorrect(0);
        setSessionTotal(0);
        setStreak(0);
        setBestStreak(0);
      };

      const loadNextTask = () => {
        const nextTask = getNextTask();
        if (nextTask) {
          setCurriculumWeek(nextTask.week);
          setCurriculumTaskIndex(nextTask.taskIndex);
          STORAGE.set("freeSampleWeek", nextTask.week);
          STORAGE.set("freeSampleTaskIndex", nextTask.taskIndex);
          setTimeout(() => applyTaskSpec(nextTask.task), 100);
        }
      };

      /*
       * Learn mode: labeled exposure with no scoring. Same shape as full v2 — sets a synthetic
       * round directly from the user's pick.
       */
      const enterLearnMode = () => {
        clearRevealSwap();
        setIsLearnMode(true);
        setShowAnswer(false);
        setTimeRemaining(null);
        const initialFreq = bandPool && bandPool.length > 0 ? bandPool[0] : 1000;
        setMode("Identify");
        setEqMode("boost");
        setRound({ freq: initialFreq, direction: "boost", gainDb });
        setListenCh("A");
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        if (reviewState.active) {
          setReviewState({ active: false, listening: 'actual', guessFreq: null, guessDir: null });
        }
      };

      const exitLearnMode = () => {
        setIsLearnMode(false);
        setRound(null);
        setShowAnswer(false);
        const task = getCurrentTask();
        if (task) {
          setTimeout(() => applyTaskSpec(task), 50);
        }
      };

      const setLearnFreq = (freq) => {
        if (!isLearnMode) return;
        setRound(prev => ({ freq, direction: prev?.direction || "boost", gainDb }));
      };

      const setLearnDirection = (dir) => {
        if (!isLearnMode) return;
        setRound(prev => prev ? { ...prev, direction: dir } : { freq: 1000, direction: dir, gainDb });
      };

      /* ---------- Effects ---------- */
      // Timer
      useEffect(() => {
        if (timeRemaining === null || timeRemaining <= 0 || showAnswer) return;
        const timer = setInterval(() => {
          setTimeRemaining(prev => {
            if (prev <= 1) {
              setTimeout(() => submitAnswer(true), 50);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [timeRemaining, showAnswer]);

      // Cleanup / page lifecycle
      useEffect(() => {
        setShowUnlock(true);
        const onVisChange = () => { if (document.hidden) stopAudio(); };
        document.addEventListener('visibilitychange', onVisChange);
        const onBeforeUnload = () => {
          if (audioContextRef.current) {
            try { audioContextRef.current.close(); } catch {}
          }
        };
        window.addEventListener('beforeunload', onBeforeUnload);
        return () => {
          document.removeEventListener('visibilitychange', onVisChange);
          window.removeEventListener('beforeunload', onBeforeUnload);
          clearRevealSwap();
          if (audioContextRef.current) {
            try { audioContextRef.current.close(); } catch {}
          }
        };
      }, []);

      useEffect(() => { updateChannelGains(); }, [listenCh]);
      useEffect(() => { updateFilters(); }, [round, answerFreq, answerDir, answerTouched, q, gainDb, mode, eqMode, reviewState]);
      useEffect(() => {
        if (masterGainRef.current && audioContextRef.current) {
          try {
            masterGainRef.current.gain.setValueAtTime(dbToGain(outputTrim), audioContextRef.current.currentTime);
          } catch {}
        }
      }, [outputTrim]);

      useEffect(() => {
        if (!audioReady || !audioSource) return;
        if (isPlaying) {
          stopAudio();
          setTimeout(() => startAudio(), 100);
        }
      }, [audioSource]);

      /*
       * Round/task lifecycle is routed through a single source of truth: applyTaskSpec.
       * modeChangeSourceRef distinguishes user-initiated mode changes from internal ones
       * triggered by loading a task. This prevents the effect race where both the mode
       * effect and the week/task effect fire on audioReady and both try to start a round.
       */
      const modeChangeSourceRef = useRef('init');

      const handleModeChange = (newMode) => {
        modeChangeSourceRef.current = 'user';
        setMode(newMode);
      };

      // React to mode changes — only when triggered by user, reset and start fresh
      useEffect(() => {
        if (!audioReady) return;
        if (modeChangeSourceRef.current !== 'user') {
          // Mode changed internally (via applyTaskSpec). applyTaskSpec already started a round.
          modeChangeSourceRef.current = 'internal';
          return;
        }
        modeChangeSourceRef.current = 'internal';
        clearRevealSwap();
        if (isPlaying && audioContextRef.current) {
          stopAudio();
          setTimeout(() => startAudio(), 100);
        }
        setRound(null);
        setShowAnswer(false);
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        setAnswerTouched(false);
        setHasLeftChannelA(false);
        setTimeout(() => newRound(), 50);
      }, [mode]);

      // When week/task changes OR audio just became ready, load the current task
      useEffect(() => {
        STORAGE.set("freeSampleWeek", curriculumWeek);
        STORAGE.set("freeSampleTaskIndex", curriculumTaskIndex);
        if (!audioReady) return;
        const task = getCurrentTask();
        if (task) {
          modeChangeSourceRef.current = 'internal';
          applyTaskSpec(task);
        }
      }, [curriculumWeek, curriculumTaskIndex, audioReady]);

      // Keyboard shortcuts state
      const [showKeyboardHelp, setShowKeyboardHelp] = useState(false);

      /*
       * Keyboard shortcuts — full QWERTY-friendly operation.
       *   Space      → play/pause
       *   A/B/C      → channel switch
       *   Enter      → submit answer / advance to next round
       *   1–9        → octave bands (63, 125, 250, 500, 1k, 2k, 4k, 8k, 16k)
       *   , / .      → nudge ±1 third within the band pool
       *   ↑ / ↓      → boost / cut direction (when direction-as-test is active)
       *   N or →     → next round (after answer reveal)
       *   R          → replay current round audio
       *   ? or /     → toggle keyboard cheat sheet
       *   Esc        → close overlays
       */
      useEffect(() => {
        const handler = (e) => {
          if (e.target.matches?.("input,textarea,select") || showUnlock) return;
          const key = e.key;
          const lower = key.toLowerCase();

          if (key === '?' || (key === '/' && !e.shiftKey)) {
            e.preventDefault();
            setShowKeyboardHelp(s => !s);
            return;
          }
          if (key === 'Escape') {
            if (showKeyboardHelp) { setShowKeyboardHelp(false); return; }
            if (showCurriculum) { setShowCurriculum(false); return; }
          }

          if (key === " ") { e.preventDefault(); toggleAudio(); return; }
          if (lower === "a" && !isChannelDisabled("A")) { switchToChannel("A"); return; }
          if (lower === "b" && round && !isChannelDisabled("B")) { switchToChannel("B"); return; }
          if (lower === "c" && round && mode !== "Identify" && !isChannelDisabled("C")) { switchToChannel("C"); return; }
          if (key === "Enter") {
            if (showAnswer) newRound();
            else submitAnswer();
            return;
          }

          if (key >= '1' && key <= '9' && round && !showAnswer) {
            const idx = parseInt(key, 10) - 1;
            const targetOctave = OCTAVE_BANDS[idx];
            if (targetOctave === undefined) return;
            let pick = null, bestDist = Infinity;
            for (const f of bandPool) {
              const d = Math.abs(Math.log2(f) - Math.log2(targetOctave));
              if (d < bestDist) { pick = f; bestDist = d; }
            }
            if (pick !== null) {
              if (mode === "Identify") setGuessFreq(pick);
              else { setAnswerTouched(true); setAnswerFreq(pick); }
            }
            return;
          }

          if ((key === ',' || key === '.') && round && !showAnswer) {
            const current = mode === "Identify" ? guessFreq : answerFreq;
            const sorted = [...bandPool].sort((a, b) => a - b);
            if (current === null || current === undefined) {
              const mid = sorted[Math.floor(sorted.length / 2)];
              if (mode === "Identify") setGuessFreq(mid);
              else { setAnswerTouched(true); setAnswerFreq(mid); }
              return;
            }
            const i = sorted.indexOf(current);
            if (i === -1) return;
            const next = key === '.' ? sorted[Math.min(sorted.length - 1, i + 1)] : sorted[Math.max(0, i - 1)];
            if (mode === "Identify") setGuessFreq(next);
            else { setAnswerTouched(true); setAnswerFreq(next); }
            return;
          }

          if ((key === 'ArrowUp' || key === 'ArrowDown') && eqMode === "both" && round && !showAnswer) {
            e.preventDefault();
            const dir = key === 'ArrowUp' ? 'boost' : 'cut';
            if (mode === "Identify") setGuessDir(dir);
            else { setAnswerTouched(true); setAnswerDir(dir); }
            return;
          }

          if ((lower === 'n' || key === 'ArrowRight') && showAnswer) {
            e.preventDefault();
            newRound();
            return;
          }

          if (lower === 'r' && round) {
            if (isPlaying) {
              stopAudio();
              setTimeout(() => startAudio(), 60);
            } else {
              startAudio();
            }
            return;
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [round, showAnswer, mode, isPlaying, showUnlock, hasLeftChannelA, guessFreq, guessDir, answerFreq, answerDir, bandPool, eqMode, showKeyboardHelp, showCurriculum]);

      /* ---------- Derived values for rendering ---------- */
      const currentTask = getCurrentTask();
      const weekPlan = getWeekPlan(curriculumWeek);
      const nextTaskExists = getNextTask() !== null;
      const isCorrect = showAnswer && evaluateCorrectness();
      const channelRoles = CHANNEL_ROLES[mode];

      /* ============================================================
         RENDER
         ============================================================ */

      return (
        <div className="min-h-screen flex flex-col">
          {showUnlock && <AudioUnlockOverlay onUnlock={initializeAudio} isLoading={audioLoading} error={audioError} />}
          {showTaskComplete && (
            <TaskCompleteModal
              data={taskCompleteData}
              onClose={() => setShowTaskComplete(false)}
              onNextTask={() => { loadNextTask(); setShowTaskComplete(false); }}
              hasNextTask={nextTaskExists}
            />
          )}
          {showKeyboardHelp && <KeyboardHelpOverlay onClose={() => setShowKeyboardHelp(false)} />}
          {showCurriculum && (
            <CurriculumPicker
              currentLevelId={currentLevelId}
              currentWeek={curriculumWeek}
              currentTaskIndex={curriculumTaskIndex}
              onSelectLevel={setCurrentLevelId}
              onSelectWeek={setCurriculumWeek}
              onSelectTask={setCurriculumTaskIndex}
              progress={progress}
              onClose={() => setShowCurriculum(false)}
            />
          )}

          {/* ============ TOP BAR ============ */}
          <header className="border-b rule">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <Wordmark compact />
              <div className="flex items-center gap-2">
                <div className="seg" aria-label="Mode toggle">
                  <button
                    className={!isLearnMode ? "active" : ""}
                    onClick={() => { if (isLearnMode) exitLearnMode(); }}
                    disabled={!audioReady}
                  >
                    Practice
                  </button>
                  <button
                    className={isLearnMode ? "active" : ""}
                    onClick={() => { if (!isLearnMode) enterLearnMode(); }}
                    disabled={!audioReady}
                  >
                    Learn
                  </button>
                </div>
                <button
                  onClick={() => setShowCurriculum(true)}
                  className="btn btn-ghost hidden sm:inline-flex"
                  disabled={!audioReady}
                >
                  <span className="font-mono text-[10px] opacity-60">Free</span>
                  <span>Curriculum</span>
                </button>
                <button
                  onClick={() => setShowCurriculum(true)}
                  className="btn btn-ghost sm:hidden"
                  disabled={!audioReady}
                  aria-label="Curriculum"
                >
                  <span className="font-mono text-[10px]">Menu</span>
                </button>
                <button
                  onClick={() => setShowDrawer(true)}
                  className="btn btn-ghost"
                  aria-label="Settings"
                >
                  <GearGlyph />
                </button>
              </div>
            </div>
          </header>

          {/* ============ CURRENT TASK STRIP ============ */}
          {currentTask && weekPlan && !isLearnMode && (
            <div className="border-b rule bg-paper">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
                <div className="flex items-center justify-between gap-4">
                  <div className="min-w-0 flex-1">
                    <div className="eyebrow mb-1">
                      Free Sample · Task {curriculumTaskIndex + 1} of {weekPlan.tasks.length}
                      {!nextTaskExists && <span className="ml-2 text-ink">· Final</span>}
                    </div>
                    <div className="font-display font-semibold text-base truncate">{weekPlan.lessonTitle}</div>
                  </div>
                  <div className="flex items-center gap-6 flex-shrink-0">
                    <div className="text-right">
                      <div className="eyebrow mb-1">Question</div>
                      <div className="font-mono text-sm">
                        {qInRound}<span className="text-mute">/{questionsPerRound}</span>
                      </div>
                    </div>
                    {streak >= 2 && (
                      <div className="text-right">
                        <div className="eyebrow mb-1">Streak</div>
                        <div className="font-mono text-sm" style={{ color: 'var(--accent)' }}>{streak}</div>
                      </div>
                    )}
                    <div className="text-right hidden sm:block">
                      <div className="eyebrow mb-1">Score</div>
                      <div className="font-mono text-sm">{percent(sessionCorrect, sessionTotal)}</div>
                    </div>
                    {timeRemaining !== null && !showAnswer && (
                      <div className={`px-3 py-1 font-mono text-xs ${timeRemaining <= 10 ? 'border border-hot text-hot' : 'border border-line-2 text-ink-2'}`}>
                        {timeRemaining}s
                      </div>
                    )}
                  </div>
                </div>
                <div className="tick-row mt-3">
                  {Array.from({ length: questionsPerRound }, (_, i) => (
                    <div
                      key={i}
                      className={`tick ${i < qInRound ? 'filled' : i === qInRound ? 'current' : ''}`}
                    />
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ============ MAIN CONTENT ============ */}
          <main className="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6 lg:py-10">
            {!currentTask && !isLearnMode ? (
              <EmptyState onOpenCurriculum={() => setShowCurriculum(true)} audioReady={audioReady} />
            ) : (
              <>
                {/* Mode selector + description. Hidden in Learn (Learn forces Identify internally). */}
                {!isLearnMode && (
                <section className="mb-6">
                  <div className="eyebrow mb-3">Mode</div>
                  <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                    <div className="seg flex-wrap">
                      {["Identify", "Matching", "Return to Flat", "Return to Flat (Memory)"].map(m => {
                        const isLocked = m !== "Matching";
                        const label = m === "Return to Flat (Memory)" ? "RTF · Memory" : m === "Return to Flat" ? "RTF" : m;
                        return (
                          <button
                            key={m}
                            className={mode === m ? "active" : ""}
                            onClick={() => {
                              if (isLocked) {
                                window.open(MEMBERSHIP_URL, "_blank", "noopener");
                              } else {
                                handleModeChange(m);
                              }
                            }}
                            disabled={!audioReady}
                            aria-label={isLocked ? `${label} — Members only` : label}
                            style={isLocked ? { opacity: 0.55 } : {}}
                          >
                            {isLocked && (
                              <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.4" aria-hidden="true" style={{ marginRight: '6px', display: 'inline-block', verticalAlign: 'middle' }}>
                                <rect x="2.5" y="5.5" width="7" height="5.5" rx="0.5" />
                                <path d="M4 5.5V3.5a2 2 0 014 0v2" />
                              </svg>
                            )}
                            {label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <p className="text-sm text-mute mt-3 leading-relaxed max-w-2xl">
                    {MODE_DESCRIPTIONS[mode]}
                    {mode === "Matching" && (
                      <>
                        {' '}
                        <span className="text-ink">
                          Identify, RTF, and RTF · Memory open up in the{' '}
                          <a href={MEMBERSHIP_URL} target="_blank" rel="noopener" className="underline hover:no-underline">full course</a>.
                        </span>
                      </>
                    )}
                  </p>
                </section>
                )}

                {/* Transport + channels — the centerpiece */}
                <section className="card-dark grain p-5 sm:p-6 mb-6" style={{ position: 'relative' }}>
                  <div className="relative z-10 flex flex-col sm:flex-row sm:items-center gap-5 sm:gap-6">
                    <button
                      className="transport"
                      onClick={toggleAudio}
                      disabled={!audioReady}
                      aria-label={isPlaying ? "Pause" : "Play"}
                    >
                      <PlayGlyph playing={isPlaying} size={20} />
                    </button>
                    <div className="flex-1 grid grid-cols-3 gap-2">
                      {["A", "B", "C"].map(ch => {
                        if (ch === "C" && mode === "Identify") return <div key={ch} />;
                        const role = channelRoles[ch];
                        if (!role) return <div key={ch} />;
                        const active = listenCh === ch;
                        const disabled = !audioReady || (ch !== "A" && !round) || isChannelDisabled(ch);
                        const locked = isChannelDisabled(ch);
                        return (
                          <button
                            key={ch}
                            className={`chan ${active ? 'active' : ''} ${locked ? 'locked' : ''}`}
                            onClick={() => switchToChannel(ch)}
                            disabled={disabled}
                          >
                            <div className="letter">{ch}</div>
                            <div className="role">{role}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Memory mode hint — quiet inline note */}
                  {mode === "Return to Flat (Memory)" && round && (
                    <div className="relative z-10 mt-4 pt-4 divider-dark">
                      <div className="text-xs text-ink-2 leading-relaxed">
                        {hasLeftChannelA
                          ? "A is locked. Work from memory — apply the opposite EQ on C to cancel what you heard on B."
                          : "Listen to A carefully. Once you leave A, you can't return."}
                      </div>
                    </div>
                  )}
                </section>

                {/* Guidance for current round */}
                {round && !showAnswer && (
                  <section className="mb-6 fade-up">
                    <div className="eyebrow mb-3">What to do</div>
                    <p className="text-sm leading-relaxed max-w-2xl">
                      {mode === "Identify" && (
                        <>Listen to <strong>A</strong> (dry) and <strong>B</strong> (processed). Identify the frequency that was {eqMode === "both" ? "boosted or cut" : eqMode === "boost" ? "boosted" : "cut"} on B.</>
                      )}
                      {mode === "Matching" && (
                        <>Listen to <strong>B</strong>. Pick the frequency{eqMode === "both" ? " and direction" : ""} that makes <strong>C</strong> sound like B.</>
                      )}
                      {mode === "Return to Flat" && (
                        <>B has a mystery EQ. Apply the opposite EQ to <strong>C</strong> so it sounds flat like <strong>A</strong>.</>
                      )}
                      {mode === "Return to Flat (Memory)" && (
                        <>Same as RTF, but once you leave A you can't return. Make C sound flat from memory.</>
                      )}
                    </p>
                  </section>
                )}

                {/* Answer reveal */}
                {showAnswer && round && (
                  <section className="mb-6 fade-up">
                    <div className={`card p-5 ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`} style={{ borderColor: 'var(--rule)' }}>
                      <div className="flex items-baseline justify-between gap-4 mb-3">
                        <div>
                          <div className="eyebrow mb-1">{isCorrect ? "Correct" : "Not quite"}</div>
                          <div className="font-display font-bold italic text-2xl">
                            {bandLabel(round.freq)} Hz · {round.direction} {gainDb}dB
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="eyebrow mb-1">Your answer</div>
                          <div className="font-mono text-sm">
                            {timeLimit > 0 && timeRemaining === 0 ? (
                              <span>Timeout</span>
                            ) : (
                              <>
                                {mode === "Identify"
                                  ? `${guessFreq ? bandLabel(guessFreq) : '—'} ${eqMode === "both" ? (guessDir || '') : ''}`
                                  : `${answerFreq ? bandLabel(answerFreq) : '—'} ${eqMode === "both" ? (answerDir || '') : ''}`}
                              </>
                            )}
                          </div>
                        </div>
                      </div>
                      {isReturnToFlatMode(mode) && (
                        <div className="text-xs text-mute font-mono pt-3 border-t rule">
                          Corrective EQ required: {bandLabel(round.freq)} Hz · {round.direction === "boost" ? "cut" : "boost"} {gainDb}dB
                        </div>
                      )}

                      {/* EQ-curve: actual response (gold), with the user's guess overlaid (non-RTF) */}
                      {(() => {
                        const curveFilters = [{ freq: round.freq, direction: round.direction, gainDb }];
                        const gf = !isReturnToFlatMode(mode) ? (mode === "Identify" ? guessFreq : answerFreq) : null;
                        const gd = mode === "Identify" ? (guessDir || round.direction) : (answerDir || round.direction);
                        const guess = gf ? [{ freq: gf, direction: gd, gainDb }] : null;
                        return (
                          <div className="pt-4 mt-4 border-t rule">
                            <div className="flex items-center justify-between mb-2">
                              <div className="eyebrow">Frequency Response</div>
                              <div className="flex items-center gap-3 font-mono text-[10px]">
                                <span style={{ color: 'var(--accent)' }}>● Actual</span>
                                {guess && <span style={{ color: 'var(--ink-3)' }}>● Your guess</span>}
                              </div>
                            </div>
                            <EqCurve filters={curveFilters} guess={guess} />
                          </div>
                        );
                      })()}

                      {/* Mistake review — A/B between actual and guess */}
                      {reviewState.active && reviewState.guessFreq && (
                        <div className="pt-4 mt-4 border-t rule">
                          <div className="eyebrow mb-3">Compare on Channel B</div>
                          <div className="grid grid-cols-2 gap-2">
                            <button
                              type="button"
                              onClick={() => { setReviewState(s => ({ ...s, listening: 'actual' })); setListenCh("B"); }}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: reviewState.listening === 'actual' ? 'var(--accent)' : 'var(--rule)',
                                background: reviewState.listening === 'actual' ? 'var(--accent)' : 'transparent',
                                color: reviewState.listening === 'actual' ? '#0d0d0e' : 'var(--ink)'
                              }}
                            >
                              <div className="font-mono text-[10px] uppercase tracking-wider opacity-70 mb-1">Actual</div>
                              <div className="font-display font-bold italic text-base">
                                {bandLabel(round.freq)} · {round.direction}
                              </div>
                            </button>
                            <button
                              type="button"
                              onClick={() => { setReviewState(s => ({ ...s, listening: 'guess' })); setListenCh("B"); }}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: reviewState.listening === 'guess' ? 'var(--accent)' : 'var(--rule)',
                                background: reviewState.listening === 'guess' ? 'var(--accent)' : 'transparent',
                                color: reviewState.listening === 'guess' ? '#0d0d0e' : 'var(--ink)'
                              }}
                            >
                              <div className="font-mono text-[10px] uppercase tracking-wider opacity-70 mb-1">Your guess</div>
                              <div className="font-display font-bold italic text-base">
                                {bandLabel(reviewState.guessFreq)} · {reviewState.guessDir || round.direction}
                              </div>
                            </button>
                          </div>
                          <p className="text-xs text-mute leading-relaxed mt-3">
                            Tap each one and listen on Channel B. Train the difference into your ear before moving on.
                          </p>
                        </div>
                      )}
                    </div>
                  </section>
                )}

                {/* Frequency grid */}
                {isLearnMode && round && (
                  <section className="mb-6 fade-up">
                    <div className="flex items-center justify-between mb-2">
                      <div className="eyebrow">Frequency Response</div>
                      <div className="font-mono text-[10px] text-mute">{bandLabel(round.freq)} Hz · {round.direction} · {gainDb} dB</div>
                    </div>
                    <EqCurve filters={[{ freq: round.freq, direction: round.direction, gainDb }]} />
                  </section>
                )}

                {((round && !showAnswer) || isLearnMode) && (
                  <section className="mb-6 fade-up">
                    <div className="flex items-center justify-between mb-3">
                      <div className="eyebrow">{isLearnMode ? "Pick a Frequency to Hear" : "Frequency"}</div>
                      <div className="font-mono text-[10px] text-mute">
                        {bandPool.length > 15 ? `1/3-oct · ${bandPool.length} bands` : `${bandPool.length} bands`}
                      </div>
                    </div>
                    <div
                      className={`grid gap-2 ${
                        bandPool.length > 20 ? 'grid-cols-5 sm:grid-cols-7 lg:grid-cols-9' :
                        bandPool.length > 15 ? 'grid-cols-4 sm:grid-cols-6 lg:grid-cols-8' :
                        bandPool.length > 9 ? 'grid-cols-3 sm:grid-cols-5 lg:grid-cols-9' :
                        'grid-cols-3 sm:grid-cols-4 lg:grid-cols-5'
                      }`}
                    >
                      {bandPool.map((freq, i) => {
                        const selected = isLearnMode
                          ? round?.freq === freq
                          : mode === "Identify" ? guessFreq === freq : answerFreq === freq;
                        return (
                          <button
                            key={freq}
                            className={`freq-pill ${selected ? 'selected' : ''}`}
                            onClick={() => {
                              if (isLearnMode) setLearnFreq(freq);
                              else if (mode === "Identify") setGuessFreq(freq);
                              else { setAnswerTouched(true); setAnswerFreq(freq); }
                            }}
                            disabled={!audioReady}
                          >
                            <span className="label">{bandLabel(freq)}</span>
                            <span className="index">{i + 1}</span>
                          </button>
                        );
                      })}
                    </div>
                  </section>
                )}

                {/* Direction — always shown in Learn; otherwise gated on direction-as-test */}
                {((round && !showAnswer && eqMode === "both") || (isLearnMode && round)) && (
                  <section className="mb-6 fade-up">
                    <div className="eyebrow mb-3">Direction</div>
                    <div className="seg">
                      {["boost", "cut"].map(d => {
                        const active = isLearnMode
                          ? round?.direction === d
                          : (mode === "Identify" ? guessDir : answerDir) === d;
                        return (
                          <button
                            key={d}
                            className={active ? "active" : ""}
                            onClick={() => {
                              if (isLearnMode) setLearnDirection(d);
                              else if (mode === "Identify") setGuessDir(d);
                              else { setAnswerTouched(true); setAnswerDir(d); }
                            }}
                          >
                            {d === "boost" ? "↑ Boost" : "↓ Cut"}
                          </button>
                        );
                      })}
                    </div>
                  </section>
                )}

                {/* Submit / next CTA — hidden in Learn (no scoring) */}
                {!isLearnMode && (
                  <section className="mb-6">
                    <button
                      className={`btn ${showAnswer ? 'btn-solid' : round ? 'btn-solid' : 'btn-ghost'} w-full sm:w-auto`}
                      style={{ minWidth: 200, padding: '16px 28px' }}
                      onClick={() => {
                        if (showAnswer) newRound();
                        else if (round) submitAnswer();
                        else newRound();
                      }}
                      disabled={!audioReady}
                    >
                      {!round ? "Start Training" : (showAnswer ? "Next Question →" : "Submit Answer")}
                    </button>
                  </section>
                )}

                {/* Learn-mode info banner */}
                {isLearnMode && (
                  <section className="mb-6">
                    <div className="card-dark p-4 sm:p-5" style={{ position: 'relative' }}>
                      <div className="eyebrow mb-1" style={{ color: 'var(--ink-3)' }}>Learn Mode</div>
                      <div className="font-display font-semibold text-base mb-1" style={{ color: 'var(--ink)' }}>
                        Pick a frequency. Listen with the label visible.
                      </div>
                      <p className="text-xs leading-relaxed" style={{ color: 'var(--ink-2)' }}>
                        Toggle Channel A (dry) and Channel B (with the EQ applied) to train your ear.
                        Switch back to Practice when you're ready to be tested.
                      </p>
                    </div>
                  </section>
                )}

                {/* Performance metrics — hidden in Learn (no scoring) */}
                {!isLearnMode && (
                <section className="card p-5 sm:p-6">
                  <div className="flex items-center justify-between mb-4">
                    <div className="eyebrow">Session</div>
                    {streak >= 3 && (
                      <div className="font-mono text-[10px] uppercase tracking-wider" style={{ color: 'var(--accent)' }}>
                        Streak · {streak}
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-5 gap-5 sm:gap-8">
                    <Metric label="Round" value={roundNum} />
                    <Metric label="Question" value={`${qInRound}/${questionsPerRound}`} />
                    <Metric label="Streak" value={streak} sub={bestStreak > 0 ? `best ${bestStreak}` : null} />
                    <Metric
                      label="Round Score"
                      value={qInRound > 0 ? percent(roundCorrect, qInRound) : "—"}
                    />
                    <Metric
                      label="Session Score"
                      value={percent(sessionCorrect, sessionTotal)}
                      sub={sessionTotal > 0 ? `${sessionCorrect} of ${sessionTotal}` : null}
                    />
                  </div>
                  <div className="mt-5">
                    <div className="flex items-center justify-between mb-2">
                      <div className="eyebrow">Accuracy</div>
                      <div className="font-mono text-[10px] text-mute">{percent(sessionCorrect, sessionTotal)}</div>
                    </div>
                    <AccuracyMeter value={sessionTotal > 0 ? sessionCorrect / sessionTotal : 0} />
                  </div>
                </section>
                )}

                {/* Keyboard shortcuts hint (desktop only) */}
                {!isMobile() && (
                  <section className="mt-8 pt-6 border-t rule">
                    <div className="flex items-center gap-6 flex-wrap text-xs font-mono text-mute">
                      <div><kbd className="border rule px-1.5 py-0.5">Space</kbd> Play/Pause</div>
                      <div><kbd className="border rule px-1.5 py-0.5">A</kbd> <kbd className="border rule px-1.5 py-0.5">B</kbd> <kbd className="border rule px-1.5 py-0.5">C</kbd> Channel</div>
                      <div><kbd className="border rule px-1.5 py-0.5">Enter</kbd> Submit / Next</div>
                    </div>
                  </section>
                )}
              </>
            )}
          </main>

          {/* ============ FOOTER ============ */}
          <footer className="border-t rule mt-auto">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 text-xs font-mono text-mute">
                <span className={`w-2 h-2 rounded-full ${audioReady ? 'bg-green' : 'bg-mute'}`}></span>
                <span>{audioReady ? (isPlaying ? "Playing" : "Ready") : "Not ready"}</span>
                <span className="opacity-40">·</span>
                <span>{audioSource === 'noise' ? 'Pink Noise' : customFileName || 'Custom'}</span>
              </div>
              <div className="text-xs font-mono text-mute hidden sm:block">
                Best with studio monitors or headphones
              </div>
            </div>
          </footer>

          {/* ============ SETTINGS DRAWER ============ */}
          <SettingsDrawer
            open={showDrawer}
            onClose={() => setShowDrawer(false)}
            audioSource={audioSource}
            setAudioSource={setAudioSource}
            customFileName={customFileName}
            customAudioInfo={customAudioInfo}
            onFileUpload={handleFileUpload}
            isLoadingFile={isLoadingFile}
            outputTrim={outputTrim}
            setOutputTrim={setOutputTrim}
            resetStats={resetStats}
            onOpenCurriculum={() => { setShowDrawer(false); setShowCurriculum(true); }}
            audioReady={audioReady}
            onResetProgress={() => {
              if (confirm("Clear all progress data? This can't be undone.")) {
                const empty = { schemaVersion: 2, levels: {} };
                setProgress(empty);
                STORAGE.set("freeSampleProgress", empty);
              }
            }}
          />
        </div>
      );
    }

    /* ============================================================
       SMALL SUB-COMPONENTS
       ============================================================ */

    function Metric({ label, value, sub }) {
      return (
        <div>
          <div className="eyebrow mb-2">{label}</div>
          <div className="font-display font-bold italic text-3xl sm:text-4xl leading-none">{value}</div>
          {sub && <div className="font-mono text-xs text-mute mt-2">{sub}</div>}
        </div>
      );
    }

    function EmptyState({ onOpenCurriculum, audioReady }) {
      return (
        <div className="max-w-xl mx-auto text-center py-16">
          <div className="eyebrow mb-4">Ear Training Lab · Free Sample</div>
          <h2 className="font-display font-bold italic text-4xl leading-tight mb-4">
            Train your ear to hear what your tools are doing.
          </h2>
          <p className="text-mute leading-relaxed mb-8">
            Three matching tasks on mids, lows, and highs. About fifteen minutes. A sample of the full 15-week curriculum inside the Audio University membership.
          </p>
          <button
            className="btn btn-solid"
            style={{ padding: '16px 28px' }}
            onClick={onOpenCurriculum}
            disabled={!audioReady}
          >
            Start Sample →
          </button>
        </div>
      );
    }

    function SettingsDrawer({
      open, onClose, audioSource, setAudioSource,
      customFileName, customAudioInfo, onFileUpload, isLoadingFile,
      outputTrim, setOutputTrim, resetStats, onOpenCurriculum, audioReady,
      onResetProgress
    }) {
      const fileInputRef = useRef(null);

      return (
        <div className={`mobile-drawer ${open ? 'open' : ''}`}>
          <div className="flex items-center justify-between px-4 sm:px-6 py-4 border-b rule">
            <Wordmark compact />
            <button onClick={onClose} className="p-2 hover:bg-rule/50" aria-label="Close">
              <CloseGlyph />
            </button>
          </div>

          <div className="flex-1 overflow-y-auto">
            <div className="max-w-2xl mx-auto px-4 sm:px-6 py-6 space-y-8">

              {/* Curriculum shortcut */}
              <section>
                <div className="eyebrow mb-3">Curriculum</div>
                <button
                  className="btn btn-ghost w-full justify-between"
                  onClick={onOpenCurriculum}
                  disabled={!audioReady}
                >
                  <span>Browse 15-Week Curriculum</span>
                  <span className="opacity-50">→</span>
                </button>
              </section>

              {/* Audio source */}
              <section>
                <div className="eyebrow mb-3">Audio Source</div>
                <div className="seg w-full mb-3" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
                  <button
                    className={audioSource === 'noise' ? 'active' : ''}
                    onClick={() => setAudioSource('noise')}
                    disabled={!audioReady}
                  >
                    Pink Noise
                  </button>
                  <button
                    className={audioSource === 'custom' ? 'active' : ''}
                    onClick={() => setAudioSource('custom')}
                    disabled={!audioReady || !customFileName}
                  >
                    Custom File
                  </button>
                </div>

                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".wav,audio/wav"
                  style={{ display: 'none' }}
                  onChange={(e) => {
                    const file = e.target.files[0];
                    if (file) {
                      const ok = file.type === 'audio/wav' || file.type === 'audio/wave' || file.name.endsWith('.wav');
                      if (ok) onFileUpload(file);
                      else alert("Please use an uncompressed WAV file.");
                    }
                  }}
                />
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => fileInputRef.current?.click()}
                  disabled={isLoadingFile}
                >
                  {isLoadingFile ? "Loading…" : customFileName ? "Replace File" : "Upload WAV"}
                </button>
                {customFileName && (
                  <div className="mt-3 font-mono text-xs text-mute">
                    {customFileName}
                    {customAudioInfo && (
                      <div className="mt-1">
                        {customAudioInfo.channels === 1 ? 'Mono' : customAudioInfo.channels === 2 ? 'Stereo' : `${customAudioInfo.channels}ch`}
                        {' · '}
                        {(customAudioInfo.sampleRate / 1000).toFixed(1)}kHz
                        {' · '}
                        {customAudioInfo.duration.toFixed(1)}s
                      </div>
                    )}
                  </div>
                )}
                <p className="text-xs text-mute mt-3 leading-relaxed">
                  Pink noise is built for ear training — equal energy per octave exposes every filter move clearly. Use a custom WAV when you want to train on source material you mix.
                </p>
              </section>

              {/* Source library — locked tease */}
              <section>
                <div className="flex items-center gap-2 mb-3">
                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.4" aria-hidden="true">
                    <rect x="2.5" y="5.5" width="7" height="5.5" rx="0.5" />
                    <path d="M4 5.5V3.5a2 2 0 014 0v2" />
                  </svg>
                  <div className="eyebrow" style={{ margin: 0 }}>Source Material · Members</div>
                </div>
                <div className="card-dark p-4" style={{ position: 'relative' }}>
                  <div className="font-display font-semibold text-base mb-2" style={{ color: 'var(--ink)' }}>
                    Train on real instruments, not just noise.
                  </div>
                  <p className="text-xs leading-relaxed mb-3" style={{ color: 'var(--ink-2)' }}>
                    Members get a curated library of kick, snare, bass, vocals, and full mixes — so you train on the material you actually mix.
                  </p>
                  <a
                    href={MEMBERSHIP_URL}
                    target="_blank"
                    rel="noopener"
                    className="btn"
                    style={{
                      background: 'var(--accent)',
                      color: '#0d0d0e',
                      borderColor: 'var(--accent-dark)',
                      textDecoration: 'none'
                    }}
                  >
                    See the Membership →
                  </a>
                </div>
              </section>

              {/* Output volume */}
              <section>
                <div className="flex items-baseline justify-between mb-3">
                  <div className="eyebrow">Output Trim</div>
                  <div className="font-mono text-sm">{outputTrim} dB</div>
                </div>
                <input
                  type="range"
                  min={-24}
                  max={0}
                  step={1}
                  value={outputTrim}
                  onChange={(e) => setOutputTrim(parseInt(e.target.value))}
                  disabled={!audioReady}
                />
              </section>

              {/* Reset */}
              <section className="pt-4 border-t rule space-y-2">
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => { resetStats(); onClose(); }}
                  disabled={!audioReady}
                >
                  Reset Session Score
                </button>
                <button
                  className="btn btn-ghost w-full"
                  onClick={onResetProgress}
                >
                  Clear All Progress
                </button>
              </section>

            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       ERROR BOUNDARY
       ============================================================ */

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error(error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center p-6">
              <div className="max-w-md w-full bg-paper p-8" style={{ border: '1px solid var(--ink)' }}>
                <Wordmark />
                <div className="divider mt-6 mb-6"></div>
                <div className="eyebrow mb-3">Something went wrong</div>
                <p className="text-sm mb-6 leading-relaxed">
                  The app hit an unexpected error. Reloading usually fixes it.
                </p>
                {this.state.error && (
                  <div className="font-mono text-xs text-mute mb-6 p-3 bg-rule/30 break-words">
                    {this.state.error.toString()}
                  </div>
                )}
                <button onClick={() => window.location.reload()} className="btn btn-solid w-full">
                  Reload Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    /* ============================================================
       MOUNT
       ============================================================ */

    (async () => {
      await loadCurriculum();
      const root = ReactDOM.createRoot(document.getElementById("app"));
      root.render(<ErrorBoundary><App /></ErrorBoundary>);
    })();
  </script>
</body>
</html>
</body>
</html>
