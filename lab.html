                  style={{ display: 'none' }}
                  onChange={(e) => {
                    const file = e.target.files[0];
                    if (file) {
                      const ok = file.type === 'audio/wav' || file.type === 'audio/wave' || file.name.endsWith('.wav');
                      if (ok) onFileUpload(file);
                      else alert("Please use an uncompressed WAV file.");
                    }
                  }}
                />
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => fileInputRef.current?.click()}
                  disabled={isLoadingFile}
                >
                  {isLoadingFile ? "Loading…" : customFileName ? "Replace File" : "Upload WAV"}
                </button>
                {customFileName && (
                  <div className="mt-3 font-mono text-xs text-mute">
                    {customFileName}
                    {customAudioInfo && (
                      <div className="mt-1">
                        {customAudioInfo.channels === 1 ? 'Mono' : customAudioInfo.channels === 2 ? 'Stereo' : `${customAudioInfo.channels}ch`}
                        {' · '}
                        {(customAudioInfo.sampleRate / 1000).toFixed(1)}kHz
                        {' · '}
                        {customAudioInfo.duration.toFixed(1)}s
                      </div>
                    )}
                  </div>
                )}
                <p className="text-xs text-mute mt-3 leading-relaxed">
                  Pink noise is built for ear training — equal energy per octave exposes every filter move clearly. Use a custom WAV when you want to train on source material you mix.
                </p>
              </section>

              {/* Source library — curated WAVs (hidden until the files exist) */}
              {onSelectLibrarySource && SHOW_SOURCE_LIBRARY && (
                <section>
                  <div className="eyebrow mb-3">Source Material</div>
                  <p className="text-xs text-mute mb-4 leading-relaxed">
                    Train on real instruments. Pink noise teaches the bands; these teach the bands as they sit in actual mixes.
                  </p>
                  {Object.keys(libraryByCategory).map(category => (
                    <div key={category} className="mb-4">
                      <div className="font-mono text-[10px] uppercase tracking-wider text-mute mb-2">{category}</div>
                      <div className="grid grid-cols-2 gap-2">
                        {libraryByCategory[category].map(s => {
                          const isActive = audioSource === 'custom' && activeSourceId === s.id;
                          return (
                            <button
                              key={s.id}
                              type="button"
                              onClick={() => onSelectLibrarySource(s)}
                              disabled={!audioReady || isLoadingFile}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: isActive ? 'var(--accent)' : 'var(--rule)',
                                background: isActive ? 'var(--accent)' : 'transparent',
                                color: isActive ? '#0d0d0e' : 'var(--ink)'
                              }}
                            >
                              <div className="font-display font-semibold text-sm">{s.name}</div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </section>
              )}

              {/* Output volume */}
              <section>
                <div className="flex items-baseline justify-between mb-3">
                  <div className="eyebrow">Output Trim</div>
                  <div className="font-mono text-sm">{outputTrim} dB</div>
                </div>
                <input
                  type="range"
                  min={-24}
                  max={0}
                  step={1}
                  value={outputTrim}
                  onChange={(e) => setOutputTrim(parseInt(e.target.value))}
                  disabled={!audioReady}
                />
              </section>

              {/* Reset */}
              <section className="pt-4 border-t rule space-y-2">
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => { resetStats(); onClose(); }}
                  disabled={!audioReady}
                >
                  Reset Session Score
                </button>
                <button
                  className="btn btn-ghost w-full"
                  onClick={onResetProgress}
                >
                  Clear All Progress
                </button>
              </section>

            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       ERROR BOUNDARY
       ============================================================ */

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error(error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center p-6">
              <div className="max-w-md w-full bg-paper p-8" style={{ border: '1px solid var(--ink)' }}>
                <Wordmark />
                <div className="divider mt-6 mb-6"></div>
                <div className="eyebrow mb-3">Something went wrong</div>
                <p className="text-sm mb-6 leading-relaxed">
                  The app hit an unexpected error. Reloading usually fixes it.
                </p>
                {this.state.error && (
                  <div className="font-mono text-xs text-mute mb-6 p-3 bg-rule/30 break-words">
                    {this.state.error.toString()}
                  </div>
                )}
                <button onClick={() => window.location.reload()} className="btn btn-solid w-full">
                  Reload Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function EqModuleWrapper(props) {
      const [eqReady, setEqReady] = useState(false);
      useEffect(() => { let m = true; loadCurriculum().then(() => { if (m) setEqReady(true); }).catch(() => { if (m) setEqReady(true); }); return () => { m = false; }; }, []);
      if (!eqReady) return <div className="min-h-screen flex items-center justify-center"><div className="eyebrow">Loading</div></div>;
      return <ErrorBoundary><App {...props} /></ErrorBoundary>;
    }
    return EqModuleWrapper;
    })();
    /* ---------- Free build: Compression is members-only ---------- */
    function FreeCompressionLock({ activeModule, onSwitchModule }) {
      return (
        <div className="min-h-screen">
          <header className="border-b rule">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <div className="flex items-center" style={{ gap: 12 }}>
                <img src={window.AU_LOGO} alt="Audio University" style={{ height: 36, width: 36, display: "block" }} />
                <div><div className="display" style={{ fontSize: 17, fontWeight: 800, letterSpacing: -0.4, lineHeight: 1 }}>Ear Training Lab</div><div className="mono" style={{ fontSize: 8, color: "var(--ink-3)", letterSpacing: 1, textTransform: "uppercase", marginTop: 2 }}>Compression</div></div>
              </div>
              <div className="seg" aria-label="Module">
                <button className={activeModule === "eq" ? "active" : ""} onClick={() => onSwitchModule("eq")}>EQ</button>
                <button className={activeModule === "compression" ? "active" : ""} onClick={() => onSwitchModule("compression")}>Compression</button>
              </div>
            </div>
          </header>
          <main className="max-w-lg mx-auto px-6 py-20 text-center">
            <div className="eyebrow mb-4">Members only</div>
            <h2 className="font-display font-bold text-3xl leading-tight mb-4">Compression training is part of membership</h2>
            <p className="text-mute leading-relaxed mb-8">The compression ear trainer is for Audio University members. The EQ trainer here is free to use.</p>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <a href={MEMBERSHIP_URL} target="_blank" rel="noopener" className="btn btn-solid" style={{ textDecoration: "none" }}>See the Membership →</a>
              <button className="btn btn-ghost" onClick={() => onSwitchModule("eq")}>Back to EQ</button>
            </div>
          </main>
        </div>
      );
    }
    /* ---------- App shell: routes between modules in-app (no reload) ---------- */
    function Shell() {
      const [activeModule, setActiveModule] = useState("eq");
      // Audio is enabled once for the whole app; both modules share that fact so
      // switching between EQ and Compression never re-prompts the unlock overlay.
      const [audioUnlocked, setAudioUnlocked] = useState(false);
      const shared = { activeModule, onSwitchModule: setActiveModule, audioPreUnlocked: audioUnlocked, onAudioUnlocked: () => setAudioUnlocked(true) };
      if (activeModule === "compression") {
        return IS_FREE
          ? <FreeCompressionLock activeModule={activeModule} onSwitchModule={setActiveModule} />
          : <CompressionModule {...shared} />;
      }
      return <EqModule {...shared} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(<Shell />);
  </script>
</body>
</html>
