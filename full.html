        // signal flows through both chains in series before reaching channel C.
        lastQuestionForC.connect(firstAnswer);
        lastAnswer.connect(channelGainsRef.current.C);
        channelGainsRef.current.C.connect(masterGainRef.current);
        masterGainRef.current.connect(ctx.destination);

        channelGainsRef.current.A.gain.setValueAtTime(1, ctx.currentTime);
        channelGainsRef.current.B.gain.setValueAtTime(0, ctx.currentTime);
        channelGainsRef.current.C.gain.setValueAtTime(0, ctx.currentTime);
        masterGainRef.current.gain.setValueAtTime(dbToGain(outputTrim), ctx.currentTime);
      };

      /* ---------- Noise ---------- */
      const createNoiseBuffer = async () => {
        const ctx = audioContextRef.current;
        if (!ctx) throw new Error('No audio context');
        // 2 seconds of noise regardless of platform. Shorter buffers on mobile
        // produced an audible looping/oscillating artifact because the buffer period
        // was short enough (0.5s) for the ear to perceive the repetition.
        const bufferLength = Math.floor(ctx.sampleRate * 2);
        const buffer = ctx.createBuffer(1, bufferLength, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        // Batch size is smaller on mobile so we yield more often and don't block the UI thread.
        const batchSize = isMobile() ? 4096 : 16384;
        for (let i = 0; i < bufferLength; i += batchSize) {
          const endIndex = Math.min(i + batchSize, bufferLength);
          for (let j = i; j < endIndex; j++) {
            const white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179;
            b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522;
            b5 = -0.7616 * b5 - white * 0.0168980;
            const pink = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
            data[j] = pink * 0.11;
            b6 = white * 0.115926;
          }
          if (isMobile()) await new Promise(r => setTimeout(r, 0));
        }
        noiseBufferRef.current = buffer;
      };

      /* ---------- Start / stop audio ---------- */
      const startAudio = async () => {
        const ctx = audioContextRef.current;
        if (!ctx) return;
        const buffer = audioSource === 'custom' ? customAudioBuffer : noiseBufferRef.current;
        if (!buffer) return;

        try {
          if (sourceRef.current) {
            try { sourceRef.current.stop(); sourceRef.current.disconnect(); } catch {}
            sourceRef.current = null;
          }
          if (ctx.state === 'suspended') {
            await ctx.resume();
            if (isMobile()) await new Promise(r => setTimeout(r, 100));
          }
          if (ctx.state !== 'running') {
            throw new Error('Audio context not running. Please interact with the page and try again.');
          }

          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(channelGainsRef.current.A);
          // Source feeds the FIRST filter of each active chain. The internal chain wiring
          // (q[i] → q[i+1], etc.) was set up once in setupAudioGraph.
          source.connect(filtersRef.current.questions[0]);
          if (isReturnToFlatMode(mode)) {
            source.connect(filtersRef.current.questionsForC[0]);
          } else {
            source.connect(filtersRef.current.answers[0]);
          }
          source.start(0);
          sourceRef.current = source;
          setIsPlaying(true);
        } catch (error) {
          setAudioError('Failed to start audio: ' + error.message);
          setIsPlaying(false);
        }
      };

      const stopAudio = () => {
        if (sourceRef.current) {
          try { sourceRef.current.stop(); sourceRef.current.disconnect(); } catch {}
          sourceRef.current = null;
        }
        setIsPlaying(false);
      };

      const toggleAudio = async () => {
        if (isPlaying) stopAudio();
        else await startAudio();
      };

      /* ---------- Filter updates ---------- */
      // Set every slot in a chain to inert (peaking @ 0 dB). Used for unused slots in
      // single-filter rounds and for fully-clearing the chain when there's no active round.
      const bypassChain = (chain, ctx, now) => {
        for (const f of chain) {
          f.gain.setValueAtTime(0, now);
        }
      };
      // Apply a single filter spec to a chain slot.
      const applyFilterSlot = (filter, freq, gainDbVal, qVal, now) => {
        filter.frequency.setValueAtTime(freq, now);
        filter.gain.setValueAtTime(gainDbVal, now);
        filter.Q.setValueAtTime(qVal, now);
      };

      const updateFilters = () => {
        const ctx = audioContextRef.current;
        if (!ctx || !filtersRef.current.questions || !filtersRef.current.answers) return;
        try {
          const now = ctx.currentTime;
          const questions     = filtersRef.current.questions;
          const questionsForC = filtersRef.current.questionsForC;
          const answers       = filtersRef.current.answers;

          // Determine the active filter set for this round.
          // Multi-filter rounds carry their data in round.filters[]; single-filter rounds
          // populate both round.filters[] AND the legacy round.freq/direction/gainDb fields.
          const activeFilters = round && Array.isArray(round.filters) && round.filters.length > 0
            ? round.filters
            : (round && round.freq !== undefined
              ? [{ freq: round.freq, direction: round.direction, gainDb: round.gainDb !== undefined ? round.gainDb : gainDb }]
              : null);

          if (activeFilters) {
            // Review mode: in single-filter rounds, when the user is listening to "your
            // guess," reroute slot 0 to the freq/direction they picked. Multi-filter
            // mistake review (Phase 6c) routes through the multi-slot guess chain instead.
            const useGuess = activeFilters.length === 1
              && reviewState.active && reviewState.listening === 'guess'
              && reviewState.guessFreq !== null && reviewState.guessFreq !== undefined;

            // Apply each active filter to its corresponding slot (0..N-1)
            for (let i = 0; i < questions.length; i++) {
              if (i < activeFilters.length) {
                const af = activeFilters[i];
                const useFreq = (useGuess && i === 0) ? reviewState.guessFreq : af.freq;
                const useDir = (useGuess && i === 0)
                  ? (reviewState.guessDir || af.direction)
                  : af.direction;
                const slotGain = (useDir === "cut" ? -1 : 1) * (af.gainDb !== undefined ? af.gainDb : gainDb);
                applyFilterSlot(questions[i], useFreq, slotGain, q, now);
              } else {
                questions[i].gain.setValueAtTime(0, now);
              }
            }

            if (isReturnToFlatMode(mode)) {
              for (let i = 0; i < questionsForC.length; i++) {
                if (i < activeFilters.length) {
                  const af = activeFilters[i];
                  const slotGain = (af.direction === "cut" ? -1 : 1) * (af.gainDb !== undefined ? af.gainDb : gainDb);
                  applyFilterSlot(questionsForC[i], af.freq, slotGain, q, now);
                } else {
                  questionsForC[i].gain.setValueAtTime(0, now);
                }
              }
            } else {
              bypassChain(questionsForC, ctx, now);
            }
          } else {
            bypassChain(questions, ctx, now);
            bypassChain(questionsForC, ctx, now);
          }

          // Multi-filter answer chain: when round has > 1 filter, route each answer slot
          // from answerFilters[i]. The user's per-slot picks drive what plays on Channel C.
          // For RTF the corrective direction is the inverse of the question; for Matching
          // the answer direction matches the question's per-slot direction.
          if (round && Array.isArray(round.filters) && round.filters.length > 1
              && Array.isArray(answerFilters)) {
            for (let i = 0; i < answers.length; i++) {
              if (i < answerFilters.length) {
                const ans = answerFilters[i];
                const slotFreq = ans.freq != null ? ans.freq : 1000;
                const slotGainAbs = ans.gainDb != null ? ans.gainDb : gainDb;
                let slotDir = ans.direction;
                if (!slotDir) {
                  if (isReturnToFlatMode(mode)) {
                    const qDir = round.filters[i] ? round.filters[i].direction : "boost";
                    slotDir = qDir === "boost" ? "cut" : "boost";
                  } else {
                    slotDir = round.filters[i] ? round.filters[i].direction : "boost";
                  }
                }
                const slotGain = ans.freq != null
                  ? (slotDir === "cut" ? -1 : 1) * slotGainAbs
                  : 0;
                applyFilterSlot(answers[i], slotFreq, slotGain, q, now);
              } else {
                answers[i].gain.setValueAtTime(0, now);
              }
            }
          } else {
            // Single-filter answer chain (existing behavior).
            let answerGain = 0;
            const cFreq = answerFreq || 1000;
            if (round && round.freq !== undefined) {
              if (isReturnToFlatMode(mode)) {
                if (answerFreq) {
                  if (eqMode === "both") {
                    if (answerDir) answerGain = (answerDir === "cut" ? -1 : 1) * gainDb;
                  } else {
                    const correctiveDirection = round.direction === "boost" ? "cut" : "boost";
                    answerGain = (correctiveDirection === "cut" ? -1 : 1) * gainDb;
                  }
                }
              } else if (mode === "Matching") {
                if (answerFreq) {
                  const useDirection = eqMode === "both" ? answerDir : round.direction;
                  if (useDirection) answerGain = (useDirection === "cut" ? -1 : 1) * gainDb;
                }
              }
            }
            applyFilterSlot(answers[0], cFreq, answerGain, q, now);
            for (let i = 1; i < answers.length; i++) {
              answers[i].gain.setValueAtTime(0, now);
            }
          }
        } catch {}
      };

      const updateChannelGains = () => {
        const ctx = audioContextRef.current;
        if (!ctx || !channelGainsRef.current.A) return;
        try {
          const now = ctx.currentTime;
          const fadeTime = 0.01;
          channelGainsRef.current.A.gain.setTargetAtTime(listenCh === "A" ? 1 : 0, now, fadeTime);
          channelGainsRef.current.B.gain.setTargetAtTime(listenCh === "B" ? 1 : 0, now, fadeTime);
          channelGainsRef.current.C.gain.setTargetAtTime(listenCh === "C" ? 1 : 0, now, fadeTime);
        } catch {}
      };

      /* ---------- Rounds ---------- */
      // Pick `n` distinct items from `pool` using Fisher-Yates partial shuffle.
      const sampleDistinct = (pool, n) => {
        const arr = [...pool];
        const out = [];
        const k = Math.min(n, arr.length);
        for (let i = 0; i < k; i++) {
          const j = i + Math.floor(Math.random() * (arr.length - i));
          [arr[i], arr[j]] = [arr[j], arr[i]];
          out.push(arr[i]);
        }
        return out;
      };

      const newRound = (poolOverride = null) => {
        clearRevealSwap();
        setListenCh("A");
        setHasLeftChannelA(false);
        // Clear any active mistake-review state from the previous round.
        if (reviewState.active) {
          setReviewState({ active: false, listening: 'actual', guessFreq: null, guessDir: null });
        }

        let pool = poolOverride;
        if (!pool || pool.length === 0) pool = bandPool.length > 0 ? bandPool : OCTAVE_BANDS;
        if (!pool || pool.length === 0) pool = OCTAVE_BANDS;

        // Build the round's filter set. For filterCount=1 (default) this is a one-element
        // array — and we also populate the legacy round.freq/direction/gainDb scalars so
        // existing single-filter UI/scoring code paths keep working unchanged.
        const count = Math.min(filterCount || 1, MAX_FILTERS, pool.length);
        const gainPool = (gainOptions && gainOptions.length > 0) ? gainOptions : [gainDb];
        const dirPool = eqMode === "both" ? ["boost", "cut"] : [eqMode];
        const pickRand = (arr) => arr[Math.floor(Math.random() * arr.length)];

        const freqs = sampleDistinct(pool, count);
        if (freqs.length === 0) return;
        const filters = freqs.map(f => ({
          freq: f,
          direction: pickRand(dirPool),
          gainDb: pickRand(gainPool)
        }));

        // Single-filter round: keep legacy fields populated for back-compat with the rest
        // of the codebase. Multi-filter round: legacy fields are intentionally undefined
        // so single-filter code paths short-circuit and only the new multi-filter UI
        // (Phase 6c) handles the round.
        const isSingle = filters.length === 1;
        const f0 = filters[0];
        setRound(isSingle
          ? { filters, freq: f0.freq, direction: f0.direction, gainDb: f0.gainDb }
          : { filters }
        );
        setShowAnswer(false);
        setTimeRemaining(timeLimit > 0 ? timeLimit : null);
        setGuessFreq(null);
        setGuessDir(eqMode === "both" ? null : eqMode);

        // Initialize per-slot guess/answer arrays. For single-filter rounds these stay
        // null and the legacy scalars are used; for multi-filter rounds these are the
        // source of truth.
        if (isSingle) {
          setGuessFilters(null);
          setAnswerFilters(null);
        } else {
          setGuessFilters(filters.map(() => ({ freq: null, direction: null, gainDb: null })));
          setAnswerFilters(filters.map(() => ({ freq: null, direction: null, gainDb: null })));
        }

        if (isReturnToFlatMode(mode)) {
          setAnswerFreq(null);
          setAnswerDir(null);
          setAnswerTouched(false);
        } else if (mode === "Matching") {
          setAnswerFreq(null);
          setAnswerDir(eqMode === "both" ? null : (isSingle ? f0.direction : null));
          setAnswerTouched(false);
        } else {
          setAnswerFreq(1000);
          setAnswerDir(eqMode !== "both" ? eqMode : null);
          setAnswerTouched(false);
        }
      };

      const applyTaskSpec = (task) => {
        if (!task) return;
        // A task is "manual" if it carries a custom freqPool array (manual mode injects this).
        // Curriculum tasks always use a named freqSet, never freqPool. Centralizing the flag
        // here keeps it in sync no matter how the task got loaded.
        setIsManualSession(Array.isArray(task.freqPool) && task.freqPool.length > 0);
        setMode(task.mode);
        // direction: "auto" or "mixed" → engine flips a coin per round and the user has to
        // identify both the frequency and whether it's a boost or a cut. Use this for advanced
        // levels where direction-recognition is part of the test.
        setEqMode((task.direction === "mixed" || task.direction === "auto") ? "both" : task.direction);
        setGainDb(task.gainDb ?? 12);
        // Q: use task.q if specified, otherwise fall back to the bandwidth-based default.
        // Tasks in Levels 1–15 don't set task.q, so they always get the Audio University
        // standard of 2.0. Future levels can dial narrower or wider per-task as needed.
        setQ(typeof task.q === 'number' ? task.q : qForBandwidth(task.bandwidth));
        // task.freqPool (custom array) takes precedence — used by manual mode.
        // Otherwise resolve via the named freqSet (curriculum tasks).
        const newBandPool = Array.isArray(task.freqPool) && task.freqPool.length > 0
          ? [...task.freqPool].sort((a, b) => a - b)
          : resolveFreqSet(task.freqSet);
        setBandPool(newBandPool);
        setTimeLimit(task.timeLimitSec || 0);
        setQuestionsPerRound(task.rounds || 12);
        // Multi-filter task fields (defaults preserve current single-filter behavior).
        const fc = Math.min(MAX_FILTERS, Math.max(1, task.filterCount || 1));
        setFilterCount(fc);
        setGainOptions(Array.isArray(task.gainOptions) && task.gainOptions.length > 0
          ? task.gainOptions
          : null);
        setRound(null);
        setShowAnswer(false);
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        setGuessFilters(null);
        setAnswerFilters(null);
        setAnswerTouched(false);
        setHasLeftChannelA(false);
        setTimeout(() => {
          const pool = newBandPool && newBandPool.length > 0 ? newBandPool : OCTAVE_BANDS;
          newRound(pool);
        }, 50);
      };

      // Set-match: every guess filter must correspond (in any order) to a unique actual
      // filter on (freq, direction, gainDb). For RTF, the user's answer direction must be
      // the inverse of the question direction.
      const evaluateMultiFilter = (guesses, actuals, isRTF) => {
        if (!Array.isArray(guesses) || !Array.isArray(actuals)) return false;
        if (guesses.length !== actuals.length) return false;
        const remaining = actuals.map((a, i) => ({ ...a, _idx: i }));
        for (const g of guesses) {
          if (g.freq == null || g.gainDb == null || !g.direction) return false;
          const idx = remaining.findIndex(a => {
            if (a.freq !== g.freq) return false;
            if (a.gainDb !== g.gainDb) return false;
            const expectedDir = isRTF
              ? (a.direction === "boost" ? "cut" : "boost")
              : a.direction;
            return g.direction === expectedDir;
          });
          if (idx === -1) return false;
          remaining.splice(idx, 1);
        }
        return true;
      };

      const evaluateCorrectness = () => {
        if (!round || (!round.freq && !(Array.isArray(round.filters) && round.filters.length > 0))) return false;

        // Multi-filter rounds use set-match across slot picks.
        if (Array.isArray(round.filters) && round.filters.length > 1) {
          const isRTF = isReturnToFlatMode(mode);
          // For Identify the user picks via guessFilters; for Matching/RTF via answerFilters.
          const guesses = mode === "Identify" ? guessFilters : answerFilters;
          return evaluateMultiFilter(guesses, round.filters, isRTF);
        }

        // Single-filter rounds — existing logic.
        if (mode === "Identify") {
          const freqCorrect = guessFreq === round.freq;
          const dirCorrect = eqMode === "both" ? guessDir === round.direction : true;
          return freqCorrect && dirCorrect;
        }
        if (mode === "Matching") {
          const freqCorrect = answerFreq === round.freq;
          const dirCorrect = eqMode === "both" ? answerDir === round.direction : true;
          return freqCorrect && dirCorrect;
        }
        if (isReturnToFlatMode(mode)) {
          const expectedDir = round.direction === "boost" ? "cut" : "boost";
          const freqCorrect = answerFreq === round.freq;
          const dirCorrect = eqMode === "both" ? answerDir === expectedDir : true;
          return freqCorrect && dirCorrect;
        }
        return false;
      };

      const submitAnswer = (isTimeout = false) => {
        const hasRound = !!(round && (round.freq || (Array.isArray(round.filters) && round.filters.length > 0)));
        if (!hasRound) return;
        const correct = isTimeout ? false : evaluateCorrectness();
        const nextQ = qInRound + 1;
        setQInRound(nextQ);
        setSessionTotal(t => t + 1);
        if (correct) {
          setRoundCorrect(rc => rc + 1);
          setSessionCorrect(sc => sc + 1);
        }

        // Mistake review: capture the user's guess so they can A/B against the actual filter.
        // Only enabled for Identify and Matching, and only for single-filter rounds (multi-filter
        // rounds use the per-slot ✓/✗ reveal which already shows the breakdown).
        const isSingleFilter = !Array.isArray(round.filters) || round.filters.length <= 1;
        if (!correct && isSingleFilter && (mode === "Identify" || mode === "Matching")) {
          const userFreq = mode === "Identify" ? guessFreq : answerFreq;
          const userDir = eqMode === "both"
            ? (mode === "Identify" ? guessDir : answerDir)
            : round.direction;
          if (userFreq) {
            setReviewState({
              active: true,
              listening: 'actual',
              guessFreq: userFreq,
              guessDir: userDir
            });
          }
        }

        if (nextQ >= questionsPerRound) {
          setRoundNum(r => r + 1);
          setQInRound(0);
          const task = getCurrentTask();
          const taskCorrect = roundCorrect + (correct ? 1 : 0);
          const taskAccuracy = Math.round((taskCorrect / questionsPerRound) * 100);
          // Only write to curriculum progress for curriculum sessions. Manual sessions
          // are ephemeral by design — completion shows accuracy but doesn't persist.
          if (!isManualSession && task) {
            saveProgress(curriculumWeek, curriculumTaskIndex, taskAccuracy);
          }
          if (isManualSession || task) {
            setTaskCompleteData({
              taskName: isManualSession ? "Custom Practice" : task.name,
              correct: taskCorrect,
              total: questionsPerRound,
              accuracy: taskAccuracy,
              week: isManualSession ? null : curriculumWeek,
              taskIndex: isManualSession ? null : curriculumTaskIndex,
              isManual: isManualSession
            });
            setShowTaskComplete(true);
          }
          setRoundCorrect(0);
        }

        setShowAnswer(true);
        clearRevealSwap();
        if (mode === "Identify") {
          setListenCh("B");
        } else if (mode === "Matching") {
          setListenCh("B");
          revealSwapTimeoutRef.current = setTimeout(() => setListenCh("C"), 1000);
        } else if (isReturnToFlatMode(mode)) {
          setListenCh("A");
          revealSwapTimeoutRef.current = setTimeout(() => setListenCh("C"), 1000);
        }
      };

      const resetStats = () => {
        setRoundNum(1);
        setQInRound(0);
        setRoundCorrect(0);
        setSessionCorrect(0);
        setSessionTotal(0);
      };

      const loadNextTask = () => {
        const nextTask = getNextTask();
        if (nextTask) {
          setCurriculumWeek(nextTask.week);
          setCurriculumTaskIndex(nextTask.taskIndex);
          STORAGE.set("curriculumWeek", nextTask.week);
          STORAGE.set("curriculumTaskIndex", nextTask.taskIndex);
          // applyTaskSpec sets isManualSession based on the task shape — no need to set it here.
          setTimeout(() => applyTaskSpec(nextTask.task), 100);
        }
      };

      /*
       * Manual practice session: builds a synthetic task struct from the user's manualConfig
       * and feeds it through the same engine that runs curriculum tasks. The session does NOT
       * write to curriculum progress (see saveProgress wrapper below).
       */
      const startManualSession = (config) => {
        const c = config || manualConfig;
        const task = {
          name: "Custom Practice",
          mode: c.mode,
          freqPool: c.freqPool,
          bandwidth: c.resolution === "thirds" ? "1_3_oct" : "1.0_oct",
          gainDb: c.gainDb,
          direction: c.direction,
          rounds: c.rounds,
          timeLimitSec: c.timeLimitSec || 0,
          filterCount: Math.min(MAX_FILTERS, Math.max(1, c.filterCount || 1)),
          gainOptions: Array.isArray(c.gainOptions) && c.gainOptions.length > 0 ? c.gainOptions : null
        };
        setIsManualSession(true);
        setShowManualSetup(false);
        setShowCurriculum(false);
        setTimeout(() => applyTaskSpec(task), 50);
      };

      /*
       * Learn mode: enter/exit and freq selection.
       * In Learn we manually set `round` based on user picks (no random generation, no scoring).
       * Mode is forced to "Identify" so only A (dry) and B (filtered) channels are in play.
       */
      const enterLearnMode = () => {
        clearRevealSwap();
        setIsLearnMode(true);
        setShowAnswer(false);
        setTimeRemaining(null);
        // Use the first band in the pool as the default Learn freq.
        const initialFreq = bandPool && bandPool.length > 0 ? bandPool[0] : 1000;
        setMode("Identify");
        setEqMode("boost");
        setRound({ freq: initialFreq, direction: "boost", gainDb });
        setListenCh("A");
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        // Clear any pending review
        if (reviewState.active) {
          setReviewState({ active: false, listening: 'actual', guessFreq: null, guessDir: null });
        }
      };

      const exitLearnMode = () => {
        setIsLearnMode(false);
        setRound(null);
        setShowAnswer(false);
        // The useEffect on [curriculumWeek, curriculumTaskIndex, audioReady] will reload
        // the active curriculum task when isLearnMode flips off and a task is selected.
        const task = isManualSession ? null : getCurrentTask();
        if (task) {
          setTimeout(() => applyTaskSpec(task), 50);
        }
      };

      const setLearnFreq = (freq) => {
        if (!isLearnMode) return;
        setRound(prev => ({ freq, direction: prev?.direction || "boost", gainDb }));
      };

      const setLearnDirection = (dir) => {
        if (!isLearnMode) return;
        setRound(prev => prev ? { ...prev, direction: dir } : { freq: 1000, direction: dir, gainDb });
      };

      /* ---------- Effects ---------- */
      // Persist manual config so the user returns to their preferred drill setup.
      useEffect(() => {
        STORAGE.set("manualConfig", manualConfig);
      }, [manualConfig]);

      // Timer
      useEffect(() => {
        if (timeRemaining === null || timeRemaining <= 0 || showAnswer) return;
        const timer = setInterval(() => {
          setTimeRemaining(prev => {
            if (prev <= 1) {
              setTimeout(() => submitAnswer(true), 50);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [timeRemaining, showAnswer]);

      // Cleanup / page lifecycle
      useEffect(() => {
        setShowUnlock(true);
        const onVisChange = () => { if (document.hidden) stopAudio(); };
        document.addEventListener('visibilitychange', onVisChange);
        const onBeforeUnload = () => {
          if (audioContextRef.current) {
            try { audioContextRef.current.close(); } catch {}
          }
        };
        window.addEventListener('beforeunload', onBeforeUnload);
        return () => {
          document.removeEventListener('visibilitychange', onVisChange);
          window.removeEventListener('beforeunload', onBeforeUnload);
          clearRevealSwap();
          if (audioContextRef.current) {
            try { audioContextRef.current.close(); } catch {}
          }
        };
      }, []);

      useEffect(() => { updateChannelGains(); }, [listenCh]);
      useEffect(() => { updateFilters(); }, [round, answerFreq, answerDir, answerTouched, q, gainDb, mode, eqMode, reviewState, answerFilters]);
      useEffect(() => {
        if (masterGainRef.current && audioContextRef.current) {
          try {
            masterGainRef.current.gain.setValueAtTime(dbToGain(outputTrim), audioContextRef.current.currentTime);
          } catch {}
        }
      }, [outputTrim]);

      useEffect(() => {
        if (!audioReady || !audioSource) return;
        if (isPlaying) {
          stopAudio();
          setTimeout(() => startAudio(), 100);
        }
      }, [audioSource]);

      /*
       * Round/task lifecycle is routed through a single source of truth: applyTaskSpec.
       * modeChangeSourceRef distinguishes user-initiated mode changes from internal ones
       * triggered by loading a task. This prevents the effect race where both the mode
       * effect and the week/task effect fire on audioReady and both try to start a round.
       */
      const modeChangeSourceRef = useRef('init');

      const handleModeChange = (newMode) => {
        modeChangeSourceRef.current = 'user';
        setMode(newMode);
      };

      // React to mode changes — only when triggered by user, reset and start fresh
      useEffect(() => {
        if (!audioReady) return;
        if (modeChangeSourceRef.current !== 'user') {
          // Mode changed internally (via applyTaskSpec). applyTaskSpec already started a round.
          modeChangeSourceRef.current = 'internal';
          return;
        }
        modeChangeSourceRef.current = 'internal';
        clearRevealSwap();
        if (isPlaying && audioContextRef.current) {
          stopAudio();
          setTimeout(() => startAudio(), 100);
        }
        setRound(null);
        setShowAnswer(false);
        setGuessFreq(null);
        setGuessDir(null);
        setAnswerFreq(null);
        setAnswerDir(null);
        setAnswerTouched(false);
        setHasLeftChannelA(false);
        setTimeout(() => newRound(), 50);
      }, [mode]);

      // When week/task changes OR audio just became ready, load the current task
      useEffect(() => {
        STORAGE.set("curriculumWeek", curriculumWeek);
        STORAGE.set("curriculumTaskIndex", curriculumTaskIndex);
        if (!audioReady) return;
        const task = getCurrentTask();
        if (task) {
          modeChangeSourceRef.current = 'internal';
          applyTaskSpec(task);
        }
      }, [curriculumWeek, curriculumTaskIndex, audioReady]);

      // Keyboard shortcuts state
      const [showKeyboardHelp, setShowKeyboardHelp] = useState(false);

      /*
       * Keyboard shortcuts — full QWERTY-friendly operation.
       *   Space      → play/pause
       *   A/B/C      → channel switch
       *   Enter      → submit answer / advance to next round
       *   1–9        → octave bands (63, 125, 250, 500, 1k, 2k, 4k, 8k, 16k)
       *   , / .      → nudge ±1 third within the band pool (third-octave drilldown)
       *   ↑ / ↓      → boost / cut direction (when direction-as-test is active)
       *   N or →     → next round (after answer reveal)
       *   R          → replay current round audio (stop+start)
       *   ? or /     → toggle keyboard cheat sheet
       *   Esc        → close keyboard cheat sheet / curriculum picker
       */
      useEffect(() => {
        const handler = (e) => {
          if (e.target.matches?.("input,textarea,select") || showUnlock) return;
          const key = e.key;
          const lower = key.toLowerCase();

          // ? toggles cheat sheet — early-exit so it works anywhere
          if (key === '?' || (key === '/' && !e.shiftKey)) {
            e.preventDefault();
            setShowKeyboardHelp(s => !s);
            return;
          }
          if (key === 'Escape') {
            if (showKeyboardHelp) { setShowKeyboardHelp(false); return; }
            if (showCurriculum) { setShowCurriculum(false); return; }
          }

          if (key === " ") { e.preventDefault(); toggleAudio(); return; }
          if (lower === "a" && !isChannelDisabled("A")) { switchToChannel("A"); return; }
          if (lower === "b" && round && !isChannelDisabled("B")) { switchToChannel("B"); return; }
          if (lower === "c" && round && mode !== "Identify" && !isChannelDisabled("C")) { switchToChannel("C"); return; }
          if (key === "Enter") {
            if (showAnswer) newRound();
            else submitAnswer();
            return;
          }

          // Number keys 1–9 → pick octave band from bandPool
          if (key >= '1' && key <= '9' && round && !showAnswer) {
            const idx = parseInt(key, 10) - 1;
            // Map 1–9 to the corresponding octave band, then find the closest match in bandPool
            const targetOctave = OCTAVE_BANDS[idx];
            if (targetOctave === undefined) return;
            // Pick the bandPool entry closest to the target octave on log2 scale
            let pick = null, bestDist = Infinity;
            for (const f of bandPool) {
              const d = Math.abs(Math.log2(f) - Math.log2(targetOctave));
              if (d < bestDist) { pick = f; bestDist = d; }
            }
            if (pick !== null) {
              if (mode === "Identify") setGuessFreq(pick);
              else { setAnswerTouched(true); setAnswerFreq(pick); }
            }
            return;
          }

          // , / . → nudge to previous/next third within bandPool
          if ((key === ',' || key === '.') && round && !showAnswer) {
            const current = mode === "Identify" ? guessFreq : answerFreq;
            const sorted = [...bandPool].sort((a, b) => a - b);
            if (current === null || current === undefined) {
              // No current pick — set to mid of pool
              const mid = sorted[Math.floor(sorted.length / 2)];
              if (mode === "Identify") setGuessFreq(mid);
              else { setAnswerTouched(true); setAnswerFreq(mid); }
              return;
            }
            const i = sorted.indexOf(current);
            if (i === -1) return;
            const next = key === '.' ? sorted[Math.min(sorted.length - 1, i + 1)] : sorted[Math.max(0, i - 1)];
            if (mode === "Identify") setGuessFreq(next);
            else { setAnswerTouched(true); setAnswerFreq(next); }
            return;
          }

          // Up/Down → direction toggle when direction-as-test is active
          if ((key === 'ArrowUp' || key === 'ArrowDown') && eqMode === "both" && round && !showAnswer) {
            e.preventDefault();
            const dir = key === 'ArrowUp' ? 'boost' : 'cut';
            if (mode === "Identify") setGuessDir(dir);
            else { setAnswerTouched(true); setAnswerDir(dir); }
            return;
          }

          // N or → → next round (after reveal)
          if ((lower === 'n' || key === 'ArrowRight') && showAnswer) {
            e.preventDefault();
            newRound();
            return;
          }

          // R → replay round audio (stop + start to retrigger sample)
          if (lower === 'r' && round) {
            if (isPlaying) {
              stopAudio();
              setTimeout(() => startAudio(), 60);
            } else {
              startAudio();
            }
            return;
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [round, showAnswer, mode, isPlaying, showUnlock, hasLeftChannelA, guessFreq, guessDir, answerFreq, answerDir, bandPool, eqMode, showKeyboardHelp, showCurriculum]);

      /* ---------- Derived values for rendering ---------- */
      const currentTask = getCurrentTask();
      const weekPlan = getWeekPlan(curriculumWeek);
      const nextTaskExists = getNextTask() !== null;
      const isCorrect = showAnswer && evaluateCorrectness();
      const channelRoles = CHANNEL_ROLES[mode];

      /* ============================================================
         RENDER
         ============================================================ */

      return (
        <div className="min-h-screen flex flex-col">
          {showUnlock && <AudioUnlockOverlay onUnlock={initializeAudio} isLoading={audioLoading} error={audioError} />}
          {showTaskComplete && (
            <TaskCompleteModal
              data={taskCompleteData}
              onClose={() => setShowTaskComplete(false)}
              onNextTask={() => { loadNextTask(); setShowTaskComplete(false); }}
              hasNextTask={nextTaskExists}
              onOpenManual={() => setShowManualSetup(true)}
            />
          )}
          {showKeyboardHelp && <KeyboardHelpOverlay onClose={() => setShowKeyboardHelp(false)} />}
          {showManualSetup && (
            <ManualSetup
              initialConfig={manualConfig}
              onClose={() => setShowManualSetup(false)}
              onConfigChange={setManualConfig}
              onStart={(cfg) => { setManualConfig(cfg); startManualSession(cfg); }}
            />
          )}
          {showCurriculum && (
            <CurriculumPicker
              currentLevelId={currentLevelId}
              currentWeek={curriculumWeek}
              currentTaskIndex={curriculumTaskIndex}
              onOpenManual={() => { setShowCurriculum(false); setShowManualSetup(true); }}
              onSelectLevel={setCurrentLevelId}
              onSelectWeek={setCurriculumWeek}
              onSelectTask={setCurriculumTaskIndex}
              progress={progress}
              onClose={() => setShowCurriculum(false)}
              onMarkComplete={markTaskComplete}
              onUnmarkComplete={unmarkTaskComplete}
            />
          )}

          {/* ============ TOP BAR ============ */}
          <header className="border-b rule">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <Wordmark compact />
              <div className="flex items-center gap-2">
                {/* Practice / Learn toggle */}
                <div className="seg" aria-label="Mode toggle">
                  <button
                    className={!isLearnMode ? "active" : ""}
                    onClick={() => { if (isLearnMode) exitLearnMode(); }}
                    disabled={!audioReady}
                  >
                    Practice
                  </button>
                  <button
                    className={isLearnMode ? "active" : ""}
                    onClick={() => { if (!isLearnMode) enterLearnMode(); }}
                    disabled={!audioReady}
                  >
                    Learn
                  </button>
                </div>
                <button
                  onClick={() => setShowCurriculum(true)}
                  className="btn btn-ghost hidden sm:inline-flex"
                  disabled={!audioReady}
                >
                  <span className="font-mono text-[10px] opacity-60">Week {curriculumWeek}</span>
                  <span>Curriculum</span>
                </button>
                <button
                  onClick={() => setShowCurriculum(true)}
                  className="btn btn-ghost sm:hidden"
                  disabled={!audioReady}
                  aria-label="Curriculum"
                >
                  <span className="font-mono text-[10px]">W{curriculumWeek}</span>
                </button>
                <button
                  onClick={() => setShowDrawer(true)}
                  className="btn btn-ghost"
                  aria-label="Settings"
                >
                  <GearGlyph />
                </button>
              </div>
            </div>
          </header>

          {/* ============ CURRENT TASK STRIP ============ */}
          {currentTask && weekPlan && !isLearnMode && (
            <div className="border-b rule bg-paper">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
                <div className="flex items-center justify-between gap-4">
                  <div className="min-w-0 flex-1">
                    <div className="eyebrow mb-1">
                      Week {curriculumWeek} · Task {curriculumTaskIndex + 1} of {weekPlan.tasks.length}
                      {!nextTaskExists && <span className="ml-2 text-ink">· Final</span>}
                    </div>
                    <div className="font-display font-semibold text-base truncate">{weekPlan.lessonTitle}</div>
                  </div>
                  <div className="flex items-center gap-6 flex-shrink-0">
                    <div className="text-right">
                      <div className="eyebrow mb-1">Question</div>
                      <div className="font-mono text-sm">
                        {qInRound}<span className="text-mute">/{questionsPerRound}</span>
                      </div>
                    </div>
                    <div className="text-right hidden sm:block">
                      <div className="eyebrow mb-1">Score</div>
                      <div className="font-mono text-sm">{percent(sessionCorrect, sessionTotal)}</div>
                    </div>
                    {timeRemaining !== null && !showAnswer && (
                      <div className={`px-3 py-1 font-mono text-xs ${timeRemaining <= 10 ? 'bg-ink text-paper' : 'border border-ink'}`}>
                        {timeRemaining}s
                      </div>
                    )}
                  </div>
                </div>
                <div className="tick-row mt-3">
                  {Array.from({ length: questionsPerRound }, (_, i) => (
                    <div
                      key={i}
                      className={`tick ${i < qInRound ? 'filled' : i === qInRound ? 'current' : ''}`}
                    />
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ============ MAIN CONTENT ============ */}
          <main className="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6 lg:py-10">
            {!currentTask && !isLearnMode ? (
              <EmptyState onOpenCurriculum={() => setShowCurriculum(true)} audioReady={audioReady} />
            ) : (
              <>
                {/* Mode selector + description — hidden in Learn (Learn forces Identify internally) */}
                {!isLearnMode && (
                  <section className="mb-6">
                    <div className="eyebrow mb-3">Mode</div>
                    <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                      <div className="seg flex-wrap">
                        {["Identify", "Matching", "Return to Flat", "Return to Flat (Memory)"].map(m => (
                          <button
                            key={m}
                            className={mode === m ? "active" : ""}
                            onClick={() => handleModeChange(m)}
                            disabled={!audioReady}
                          >
                            {m === "Return to Flat (Memory)" ? "RTF · Memory" : m === "Return to Flat" ? "RTF" : m}
                          </button>
                        ))}
                      </div>
                    </div>
                    <p className="text-sm text-mute mt-3 leading-relaxed max-w-2xl">
                      {MODE_DESCRIPTIONS[mode]}
                    </p>
                  </section>
                )}

                {/* Transport + channels — the centerpiece */}
                <section className="card-dark grain p-5 sm:p-6 mb-6" style={{ position: 'relative' }}>
                  <div className="relative z-10 flex flex-col sm:flex-row sm:items-center gap-5 sm:gap-6">
                    <button
                      className="transport"
                      onClick={toggleAudio}
                      disabled={!audioReady}
                      aria-label={isPlaying ? "Pause" : "Play"}
                    >
                      <PlayGlyph playing={isPlaying} size={20} />
                    </button>
                    <div className="flex-1 grid grid-cols-3 gap-2">
                      {["A", "B", "C"].map(ch => {
                        if (ch === "C" && mode === "Identify") return <div key={ch} />;
                        const role = channelRoles[ch];
                        if (!role) return <div key={ch} />;
                        const active = listenCh === ch;
                        const disabled = !audioReady || (ch !== "A" && !round) || isChannelDisabled(ch);
                        const locked = isChannelDisabled(ch);
                        return (
                          <button
                            key={ch}
                            className={`chan ${active ? 'active' : ''} ${locked ? 'locked' : ''}`}
                            onClick={() => switchToChannel(ch)}
                            disabled={disabled}
                          >
                            <div className="letter">{ch}</div>
                            <div className="role">{role}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Memory mode hint — quiet inline note */}
                  {mode === "Return to Flat (Memory)" && round && (
                    <div className="relative z-10 mt-4 pt-4 divider-dark">
                      <div className="text-xs text-paper/70 leading-relaxed">
                        {hasLeftChannelA
                          ? "A is locked. Work from memory — apply the opposite EQ on C to cancel what you heard on B."
                          : "Listen to A carefully. Once you leave A, you can't return."}
                      </div>
                    </div>
                  )}
                </section>

                {/* Guidance for current round */}
                {round && !showAnswer && (
                  <section className="mb-6 fade-up">
                    <div className="eyebrow mb-3">What to do</div>
                    <p className="text-sm leading-relaxed max-w-2xl">
                      {mode === "Identify" && (
                        <>Listen to <strong>A</strong> (dry) and <strong>B</strong> (processed). Identify the frequency that was {eqMode === "both" ? "boosted or cut" : eqMode === "boost" ? "boosted" : "cut"} on B.</>
                      )}
                      {mode === "Matching" && (
                        <>Listen to <strong>B</strong>. Pick the frequency{eqMode === "both" ? " and direction" : ""} that makes <strong>C</strong> sound like B.</>
                      )}
                      {mode === "Return to Flat" && (
                        <>B has a mystery EQ. Apply the opposite EQ to <strong>C</strong> so it sounds flat like <strong>A</strong>.</>
                      )}
                      {mode === "Return to Flat (Memory)" && (
                        <>Same as RTF, but once you leave A you can't return. Make C sound flat from memory.</>
                      )}
                    </p>
                  </section>
                )}

                {/* Answer reveal */}
                {showAnswer && round && (
                  <section className="mb-6 fade-up">
                    <div className="card p-5 border-ink" style={{ borderColor: 'var(--ink)' }}>
                      {/* Multi-filter reveal: per-slot list with ✓/✗ */}
                      {Array.isArray(round.filters) && round.filters.length > 1 ? (
                        <>
                          <div className="eyebrow mb-3">{isCorrect ? "Correct" : "Not quite"}</div>
                          <div className="space-y-2">
                            {round.filters.map((af, i) => {
                              const isRTF = isReturnToFlatMode(mode);
                              const expectedDir = isRTF ? (af.direction === "boost" ? "cut" : "boost") : af.direction;
                              const guesses = mode === "Identify" ? guessFilters : answerFilters;
                              // Find the user's pick that matches this actual filter
                              const matchedGuess = (guesses || []).find(g =>
                                g.freq === af.freq && g.gainDb === af.gainDb && g.direction === expectedDir
                              );
                              const slotCorrect = !!matchedGuess;
                              return (
                                <div key={i} className="flex items-baseline justify-between border-t rule pt-2">
                                  <div className="flex items-baseline gap-2">
                                    <span className="font-mono text-xs text-mute">F{i + 1}</span>
                                    <span className="font-display font-bold italic text-base">
                                      {bandLabel(af.freq)} · {af.direction} · {af.gainDb} dB
                                    </span>
                                  </div>
                                  <span className={`font-mono text-sm ${slotCorrect ? '' : 'text-mute'}`}>
                                    {slotCorrect ? '✓' : '✗'}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                          {isReturnToFlatMode(mode) && (
                            <div className="text-xs text-mute font-mono pt-3 mt-3 border-t rule">
                              Corrective EQ required: each filter inverted on Channel C.
                            </div>
                          )}
                        </>
                      ) : (
                        <>
                          <div className="flex items-baseline justify-between gap-4 mb-3">
                            <div>
                              <div className="eyebrow mb-1">{isCorrect ? "Correct" : "Not quite"}</div>
                              <div className="font-display font-bold italic text-2xl">
                                {bandLabel(round.freq)} Hz · {round.direction} {gainDb}dB
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="eyebrow mb-1">Your answer</div>
                              <div className="font-mono text-sm">
                                {timeLimit > 0 && timeRemaining === 0 ? (
                                  <span>Timeout</span>
                                ) : (
                                  <>
                                    {mode === "Identify"
                                      ? `${guessFreq ? bandLabel(guessFreq) : '—'} ${eqMode === "both" ? (guessDir || '') : ''}`
                                      : `${answerFreq ? bandLabel(answerFreq) : '—'} ${eqMode === "both" ? (answerDir || '') : ''}`}
                                  </>
                                )}
                              </div>
                            </div>
                          </div>
                          {isReturnToFlatMode(mode) && (
                            <div className="text-xs text-mute font-mono pt-3 border-t rule">
                              Corrective EQ required: {bandLabel(round.freq)} Hz · {round.direction === "boost" ? "cut" : "boost"} {gainDb}dB
                            </div>
                          )}
                        </>
                      )}

                      {/* Mistake review — A/B between actual and guess (single-filter only) */}
                      {reviewState.active && reviewState.guessFreq && (!round.filters || round.filters.length <= 1) && (
                        <div className="pt-4 mt-4 border-t rule">
                          <div className="eyebrow mb-3">Compare on Channel B</div>
                          <div className="grid grid-cols-2 gap-2">
                            <button
                              type="button"
                              onClick={() => { setReviewState(s => ({ ...s, listening: 'actual' })); setListenCh("B"); }}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: reviewState.listening === 'actual' ? 'var(--ink)' : 'var(--rule)',
                                background: reviewState.listening === 'actual' ? 'var(--ink)' : 'transparent',
                                color: reviewState.listening === 'actual' ? 'var(--paper)' : 'var(--ink)'
                              }}
                            >
                              <div className="font-mono text-[10px] uppercase tracking-wider opacity-70 mb-1">Actual</div>
                              <div className="font-display font-bold italic text-base">
                                {bandLabel(round.freq)} · {round.direction}
                              </div>
                            </button>
                            <button
                              type="button"
                              onClick={() => { setReviewState(s => ({ ...s, listening: 'guess' })); setListenCh("B"); }}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: reviewState.listening === 'guess' ? 'var(--ink)' : 'var(--rule)',
                                background: reviewState.listening === 'guess' ? 'var(--ink)' : 'transparent',
                                color: reviewState.listening === 'guess' ? 'var(--paper)' : 'var(--ink)'
                              }}
                            >
                              <div className="font-mono text-[10px] uppercase tracking-wider opacity-70 mb-1">Your guess</div>
                              <div className="font-display font-bold italic text-base">
                                {bandLabel(reviewState.guessFreq)} · {reviewState.guessDir || round.direction}
                              </div>
                            </button>
                          </div>
                          <p className="text-xs text-mute leading-relaxed mt-3">
                            Tap each one and listen on Channel B. Train the difference into your ear before moving on.
                          </p>
                        </div>
                      )}
                    </div>
                  </section>
                )}

                {/* MULTI-FILTER / VARIABLE-GAIN picker (Phase 6c).
                    Used when the round has > 1 filter OR when the task offers multiple gain
                    options (so the user has to pick the gain, not just freq+direction). */}
                {round && !showAnswer && Array.isArray(round.filters) &&
                 (round.filters.length > 1 || (gainOptions && gainOptions.length > 1)) && (
                  <section className="mb-6 fade-up space-y-4">
                    <div className="flex items-center justify-between mb-1">
                      <div className="eyebrow">{round.filters.length} Filters Active</div>
                      <div className="font-mono text-[10px] text-mute">Fill every slot in any order</div>
                    </div>
                    {round.filters.map((_, slotIdx) => {
                      const isIdentify = mode === "Identify";
                      const slots = isIdentify ? guessFilters : answerFilters;
                      const setSlots = isIdentify ? setGuessFilters : setAnswerFilters;
                      const slot = slots && slots[slotIdx] ? slots[slotIdx] : { freq: null, direction: null, gainDb: null };
                      const updateSlot = (patch) => {
                        if (!slots) return;
                        const next = slots.map((s, i) => i === slotIdx ? { ...s, ...patch } : s);
                        setSlots(next);
                        if (!isIdentify) setAnswerTouched(true);
                      };
                      // Other slots' picked freqs are unavailable (must be distinct)
                      const otherFreqs = slots
                        ? slots.map((s, i) => i !== slotIdx ? s.freq : null).filter(f => f != null)
                        : [];
                      const showDirection = (gainOptions && gainOptions.length > 0) || eqMode === "both";
                      const showGain = gainOptions && gainOptions.length > 1;
                      return (
                        <div key={slotIdx} className="card p-4 sm:p-5" style={{ borderColor: 'var(--ink)' }}>
                          <div className="flex items-baseline justify-between mb-3">
                            <div className="font-display font-bold italic text-base">Filter {slotIdx + 1}</div>
                            <div className="font-mono text-xs text-mute">
                              {slot.freq ? bandLabel(slot.freq) : '—'}
                              {showDirection && slot.direction ? ` · ${slot.direction}` : ''}
                              {showGain && slot.gainDb ? ` · ${slot.gainDb}dB` : ''}
                            </div>
                          </div>
                          {/* Freq pills */}
                          <div
                            className={`grid gap-2 mb-3 ${
                              bandPool.length > 20 ? 'grid-cols-5 sm:grid-cols-7 lg:grid-cols-9' :
                              bandPool.length > 15 ? 'grid-cols-4 sm:grid-cols-6 lg:grid-cols-8' :
                              bandPool.length > 9 ? 'grid-cols-3 sm:grid-cols-5 lg:grid-cols-9' :
                              'grid-cols-3 sm:grid-cols-4 lg:grid-cols-5'
                            }`}
                          >
                            {bandPool.map(freq => {
                              const selected = slot.freq === freq;
                              const taken = !selected && otherFreqs.includes(freq);
                              return (
                                <button
                                  key={freq}
                                  className={`freq-pill ${selected ? 'selected' : ''}`}
                                  onClick={() => updateSlot({ freq })}
                                  disabled={!audioReady || taken}
                                  style={taken ? { opacity: 0.25 } : {}}
                                  title={taken ? 'Already picked in another slot' : undefined}
                                >
                                  <span className="label">{bandLabel(freq)}</span>
                                </button>
                              );
                            })}
                          </div>
                          {/* Direction (when relevant) */}
                          {showDirection && (
                            <div className="seg mb-3">
                              {["boost", "cut"].map(d => (
                                <button
                                  key={d}
                                  className={slot.direction === d ? 'active' : ''}
                                  onClick={() => updateSlot({ direction: d })}
                                >
                                  {d === "boost" ? "↑ Boost" : "↓ Cut"}
                                </button>
                              ))}
                            </div>
                          )}
                          {/* Gain options (when there's a choice) */}
                          {showGain && (
                            <div className="seg flex-wrap">
                              {gainOptions.map(g => (
                                <button
                                  key={g}
                                  className={slot.gainDb === g ? 'active' : ''}
                                  onClick={() => updateSlot({ gainDb: g })}
                                >
                                  {g} dB
                                </button>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </section>
                )}

                {/* SINGLE-filter Frequency grid (existing) — hidden when slot-picker is in use */}
                {((round && !showAnswer && (!round.filters || round.filters.length <= 1) && (!gainOptions || gainOptions.length <= 1)) || isLearnMode) && (
                  <section className="mb-6 fade-up">
                    <div className="flex items-center justify-between mb-3">
                      <div className="eyebrow">{isLearnMode ? "Pick a Frequency to Hear" : "Frequency"}</div>
                      <div className="font-mono text-[10px] text-mute">
                        {bandPool.length > 15 ? `1/3-oct · ${bandPool.length} bands` : `${bandPool.length} bands`}
                      </div>
                    </div>
                    <div
                      className={`grid gap-2 ${
                        bandPool.length > 20 ? 'grid-cols-5 sm:grid-cols-7 lg:grid-cols-9' :
                        bandPool.length > 15 ? 'grid-cols-4 sm:grid-cols-6 lg:grid-cols-8' :
                        bandPool.length > 9 ? 'grid-cols-3 sm:grid-cols-5 lg:grid-cols-9' :
                        'grid-cols-3 sm:grid-cols-4 lg:grid-cols-5'
                      }`}
                    >
                      {bandPool.map((freq, i) => {
                        const selected = isLearnMode
                          ? round?.freq === freq
                          : mode === "Identify" ? guessFreq === freq : answerFreq === freq;
                        return (
                          <button
                            key={freq}
                            className={`freq-pill ${selected ? 'selected' : ''}`}
                            onClick={() => {
                              if (isLearnMode) setLearnFreq(freq);
                              else if (mode === "Identify") setGuessFreq(freq);
                              else { setAnswerTouched(true); setAnswerFreq(freq); }
                            }}
                            disabled={!audioReady}
                          >
                            <span className="label">{bandLabel(freq)}</span>
                            <span className="index">{i + 1}</span>
                          </button>
                        );
                      })}
                    </div>
                  </section>
                )}

                {/* SINGLE-filter Direction toggle (existing — hidden when slot-picker is in use) */}
                {((round && !showAnswer && eqMode === "both" && (!round.filters || round.filters.length <= 1) && (!gainOptions || gainOptions.length <= 1)) || (isLearnMode && round)) && (
                  <section className="mb-6 fade-up">
                    <div className="eyebrow mb-3">Direction</div>
                    <div className="seg">
                      {["boost", "cut"].map(d => {
                        const active = isLearnMode
                          ? round?.direction === d
                          : (mode === "Identify" ? guessDir : answerDir) === d;
                        return (
                          <button
                            key={d}
                            className={active ? "active" : ""}
                            onClick={() => {
                              if (isLearnMode) setLearnDirection(d);
                              else if (mode === "Identify") setGuessDir(d);
                              else { setAnswerTouched(true); setAnswerDir(d); }
                            }}
                          >
                            {d === "boost" ? "↑ Boost" : "↓ Cut"}
                          </button>
                        );
                      })}
                    </div>
                  </section>
                )}

                {/* Submit / next CTA — hidden in Learn (no scoring) */}
                {!isLearnMode && (() => {
                  // For multi-filter / variable-gain rounds, gate submit on every slot being
                  // fully populated. For single-filter rounds, the existing engine guards
                  // are enough.
                  const isSlotMode = round && Array.isArray(round.filters) &&
                    (round.filters.length > 1 || (gainOptions && gainOptions.length > 1));
                  let slotsReady = true;
                  if (isSlotMode && !showAnswer) {
                    const slots = mode === "Identify" ? guessFilters : answerFilters;
                    if (!Array.isArray(slots) || slots.length !== round.filters.length) {
                      slotsReady = false;
                    } else {
                      const showDirection = (gainOptions && gainOptions.length > 0) || eqMode === "both";
                      const showGain = gainOptions && gainOptions.length > 1;
                      slotsReady = slots.every(s =>
                        s.freq != null
                        && (!showDirection || s.direction)
                        && (!showGain || s.gainDb != null)
                      );
                    }
                  }
                  return (
                    <section className="mb-6">
                      <button
                        className={`btn ${showAnswer ? 'btn-solid' : round ? 'btn-solid' : 'btn-ghost'} w-full sm:w-auto`}
                        style={{ minWidth: 200, padding: '16px 28px' }}
                        onClick={() => {
                          if (showAnswer) newRound();
                          else if (round) submitAnswer();
                          else newRound();
                        }}
                        disabled={!audioReady || (isSlotMode && !showAnswer && !slotsReady)}
                      >
                        {!round ? "Start Training" : (showAnswer ? "Next Question →" : "Submit Answer")}
                      </button>
                      {isSlotMode && !showAnswer && !slotsReady && (
                        <p className="text-xs text-mute mt-2 leading-relaxed">
                          Fill in every filter slot before submitting.
                        </p>
                      )}
                    </section>
                  );
                })()}

                {/* Learn-mode info banner */}
                {isLearnMode && (
                  <section className="mb-6">
                    <div className="card-dark p-4 sm:p-5" style={{ position: 'relative' }}>
                      <div className="eyebrow mb-1" style={{ color: 'rgba(250,250,247,0.55)' }}>Learn Mode</div>
                      <div className="font-display font-semibold text-base mb-1" style={{ color: 'var(--paper)' }}>
                        Pick a frequency. Listen with the label visible.
                      </div>
                      <p className="text-xs leading-relaxed" style={{ color: 'rgba(250,250,247,0.75)' }}>
                        Toggle Channel A (dry) and Channel B (with the EQ applied) to train your ear on what each band sounds like.
                        Switch back to Practice when you're ready to be tested.
                      </p>
                    </div>
                  </section>
                )}

                {/* Performance metrics — hidden in Learn (no scoring) */}
                {!isLearnMode && (
                <section className="card p-5 sm:p-6">
                  <div className="eyebrow mb-4">Session</div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-5 sm:gap-8">
                    <Metric label="Round" value={roundNum} />
                    <Metric label="Question" value={`${qInRound}/${questionsPerRound}`} />
                    <Metric
                      label="Round Score"
                      value={qInRound > 0 ? percent(roundCorrect, qInRound) : "—"}
                    />
                    <Metric
                      label="Session Score"
                      value={percent(sessionCorrect, sessionTotal)}
                      sub={sessionTotal > 0 ? `${sessionCorrect} of ${sessionTotal}` : null}
                    />
                  </div>
                </section>
                )}

                {/* Keyboard shortcuts hint (desktop only) */}
                {!isMobile() && (
                  <section className="mt-8 pt-6 border-t rule">
                    <div className="flex items-center gap-6 flex-wrap text-xs font-mono text-mute">
                      <div><kbd className="border rule px-1.5 py-0.5">Space</kbd> Play/Pause</div>
                      <div><kbd className="border rule px-1.5 py-0.5">A</kbd> <kbd className="border rule px-1.5 py-0.5">B</kbd> <kbd className="border rule px-1.5 py-0.5">C</kbd> Channel</div>
                      <div><kbd className="border rule px-1.5 py-0.5">Enter</kbd> Submit / Next</div>
                    </div>
                  </section>
                )}
              </>
            )}
          </main>

          {/* ============ FOOTER ============ */}
          <footer className="border-t rule mt-auto">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 text-xs font-mono text-mute">
                <span className={`w-2 h-2 rounded-full ${audioReady ? 'bg-ink' : 'bg-mute'}`}></span>
                <span>{audioReady ? (isPlaying ? "Playing" : "Ready") : "Not ready"}</span>
                <span className="opacity-40">·</span>
                <span>{audioSource === 'noise' ? 'Pink Noise' : customFileName || 'Custom'}</span>
              </div>
              <div className="text-xs font-mono text-mute hidden sm:block">
                Best with studio monitors or headphones
              </div>
            </div>
          </footer>

          {/* ============ SETTINGS DRAWER ============ */}
          <SettingsDrawer
            open={showDrawer}
            onClose={() => setShowDrawer(false)}
            audioSource={audioSource}
            setAudioSource={setAudioSource}
            customFileName={customFileName}
            customAudioInfo={customAudioInfo}
            onFileUpload={handleFileUpload}
            isLoadingFile={isLoadingFile}
            outputTrim={outputTrim}
            setOutputTrim={setOutputTrim}
            resetStats={resetStats}
            onOpenCurriculum={() => { setShowDrawer(false); setShowCurriculum(true); }}
            onOpenManual={() => { setShowDrawer(false); setShowManualSetup(true); }}
            onSelectLibrarySource={loadSourceFromLibrary}
            activeSourceId={activeSourceId}
            audioReady={audioReady}
            onResetProgress={() => {
              if (confirm("Clear all progress data? This can't be undone.")) {
                const empty = { schemaVersion: 2, levels: {} };
                setProgress(empty);
                STORAGE.set("earTrainingProgress", empty);
              }
            }}
          />
        </div>
      );
    }

    /* ============================================================
       SMALL SUB-COMPONENTS
       ============================================================ */

    function Metric({ label, value, sub }) {
      return (
        <div>
          <div className="eyebrow mb-2">{label}</div>
          <div className="font-display font-bold italic text-3xl sm:text-4xl leading-none">{value}</div>
          {sub && <div className="font-mono text-xs text-mute mt-2">{sub}</div>}
        </div>
      );
    }

    function EmptyState({ onOpenCurriculum, audioReady }) {
      return (
        <div className="max-w-xl mx-auto text-center py-16">
          <div className="eyebrow mb-4">Ear Training Lab</div>
          <h2 className="font-display font-bold italic text-4xl leading-tight mb-4">
            Train your ear to hear what your tools are doing.
          </h2>
          <p className="text-mute leading-relaxed mb-8">
            Structured lessons built around the Audio University 15-week curriculum.
            Pick a week to start.
          </p>
          <button
            className="btn btn-solid"
            style={{ padding: '16px 28px' }}
            onClick={onOpenCurriculum}
            disabled={!audioReady}
          >
            Open Curriculum →
          </button>
        </div>
      );
    }

    function SettingsDrawer({
      open, onClose, audioSource, setAudioSource,
      customFileName, customAudioInfo, onFileUpload, isLoadingFile,
      outputTrim, setOutputTrim, resetStats, onOpenCurriculum, onOpenManual, audioReady,
      onResetProgress, onSelectLibrarySource, activeSourceId
    }) {
      const fileInputRef = useRef(null);

      // Group library sources by category for clean rendering.
      const libraryByCategory = SOURCE_LIBRARY.reduce((acc, s) => {
        if (!acc[s.category]) acc[s.category] = [];
        acc[s.category].push(s);
        return acc;
      }, {});

      return (
        <div className={`mobile-drawer ${open ? 'open' : ''}`}>
          <div className="flex items-center justify-between px-4 sm:px-6 py-4 border-b rule">
            <Wordmark compact />
            <button onClick={onClose} className="p-2 hover:bg-rule/50" aria-label="Close">
              <CloseGlyph />
            </button>
          </div>

          <div className="flex-1 overflow-y-auto">
            <div className="max-w-2xl mx-auto px-4 sm:px-6 py-6 space-y-8">

              {/* Curriculum shortcut */}
              <section>
                <div className="eyebrow mb-3">Curriculum</div>
                <button
                  className="btn btn-ghost w-full justify-between"
                  onClick={onOpenCurriculum}
                  disabled={!audioReady}
                >
                  <span>Browse Curriculum</span>
                  <span className="opacity-50">→</span>
                </button>
              </section>

              {/* Manual practice shortcut */}
              {onOpenManual && (
                <section>
                  <div className="eyebrow mb-3">Manual Practice</div>
                  <button
                    className="btn btn-ghost w-full justify-between"
                    onClick={onOpenManual}
                    disabled={!audioReady}
                  >
                    <span>Build Custom Session</span>
                    <span className="opacity-50">→</span>
                  </button>
                </section>
              )}

              {/* Audio source */}
              <section>
                <div className="eyebrow mb-3">Audio Source</div>
                <div className="seg w-full mb-3" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
                  <button
                    className={audioSource === 'noise' ? 'active' : ''}
                    onClick={() => setAudioSource('noise')}
                    disabled={!audioReady}
                  >
                    Pink Noise
                  </button>
                  <button
                    className={audioSource === 'custom' ? 'active' : ''}
                    onClick={() => setAudioSource('custom')}
                    disabled={!audioReady || !customFileName}
                  >
                    Custom File
                  </button>
                </div>

                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".wav,audio/wav"
                  style={{ display: 'none' }}
                  onChange={(e) => {
                    const file = e.target.files[0];
                    if (file) {
                      const ok = file.type === 'audio/wav' || file.type === 'audio/wave' || file.name.endsWith('.wav');
                      if (ok) onFileUpload(file);
                      else alert("Please use an uncompressed WAV file.");
                    }
                  }}
                />
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => fileInputRef.current?.click()}
                  disabled={isLoadingFile}
                >
                  {isLoadingFile ? "Loading…" : customFileName ? "Replace File" : "Upload WAV"}
                </button>
                {customFileName && (
                  <div className="mt-3 font-mono text-xs text-mute">
                    {customFileName}
                    {customAudioInfo && (
                      <div className="mt-1">
                        {customAudioInfo.channels === 1 ? 'Mono' : customAudioInfo.channels === 2 ? 'Stereo' : `${customAudioInfo.channels}ch`}
                        {' · '}
                        {(customAudioInfo.sampleRate / 1000).toFixed(1)}kHz
                        {' · '}
                        {customAudioInfo.duration.toFixed(1)}s
                      </div>
                    )}
                  </div>
                )}
                <p className="text-xs text-mute mt-3 leading-relaxed">
                  Pink noise is built for ear training — equal energy per octave exposes every filter move clearly. Use a custom WAV when you want to train on source material you mix.
                </p>
              </section>

              {/* Source library — curated WAVs */}
              {onSelectLibrarySource && (
                <section>
                  <div className="eyebrow mb-3">Source Material</div>
                  <p className="text-xs text-mute mb-4 leading-relaxed">
                    Train on real instruments. Pink noise teaches the bands; these teach the bands as they sit in actual mixes.
                  </p>
                  {Object.keys(libraryByCategory).map(category => (
                    <div key={category} className="mb-4">
                      <div className="font-mono text-[10px] uppercase tracking-wider text-mute mb-2">{category}</div>
                      <div className="grid grid-cols-2 gap-2">
                        {libraryByCategory[category].map(s => {
                          const isActive = audioSource === 'custom' && activeSourceId === s.id;
                          return (
                            <button
                              key={s.id}
                              type="button"
                              onClick={() => onSelectLibrarySource(s)}
                              disabled={!audioReady || isLoadingFile}
                              className="p-3 border text-left transition-colors"
                              style={{
                                borderColor: isActive ? 'var(--ink)' : 'var(--rule)',
                                background: isActive ? 'var(--ink)' : 'transparent',
                                color: isActive ? 'var(--paper)' : 'var(--ink)'
                              }}
                            >
                              <div className="font-display font-semibold text-sm">{s.name}</div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </section>
              )}

              {/* Output volume */}
              <section>
                <div className="flex items-baseline justify-between mb-3">
                  <div className="eyebrow">Output Trim</div>
                  <div className="font-mono text-sm">{outputTrim} dB</div>
                </div>
                <input
                  type="range"
                  min={-24}
                  max={0}
                  step={1}
                  value={outputTrim}
                  onChange={(e) => setOutputTrim(parseInt(e.target.value))}
                  disabled={!audioReady}
                />
              </section>

              {/* Reset */}
              <section className="pt-4 border-t rule space-y-2">
                <button
                  className="btn btn-ghost w-full"
                  onClick={() => { resetStats(); onClose(); }}
                  disabled={!audioReady}
                >
                  Reset Session Score
                </button>
                <button
                  className="btn btn-ghost w-full"
                  onClick={onResetProgress}
                >
                  Clear All Progress
                </button>
              </section>

            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       ERROR BOUNDARY
       ============================================================ */

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error(error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center p-6">
              <div className="max-w-md w-full bg-paper p-8" style={{ border: '1px solid var(--ink)' }}>
                <Wordmark />
                <div className="divider mt-6 mb-6"></div>
                <div className="eyebrow mb-3">Something went wrong</div>
                <p className="text-sm mb-6 leading-relaxed">
                  The app hit an unexpected error. Reloading usually fixes it.
                </p>
                {this.state.error && (
                  <div className="font-mono text-xs text-mute mb-6 p-3 bg-rule/30 break-words">
                    {this.state.error.toString()}
                  </div>
                )}
                <button onClick={() => window.location.reload()} className="btn btn-solid w-full">
                  Reload Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    /* ============================================================
       MOUNT
       ============================================================ */

    (async () => {
      await loadCurriculum();
      const root = ReactDOM.createRoot(document.getElementById("app"));
      root.render(<ErrorBoundary><App /></ErrorBoundary>);
    })();
  </script>
</body>
</html>
</body>
</html>
